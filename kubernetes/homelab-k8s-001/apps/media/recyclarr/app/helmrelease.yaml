---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: recyclarr

spec:

  interval: 1h

  chartRef:
    kind: OCIRepository
    name: recyclarr

  values:

    defaultPodOptions:
      restartPolicy: OnFailure

    controllers:
      recyclarr:
        type: cronjob

        cronjob:
          schedule: "@daily"
          ttlSecondsAfterFinished: 86400

        containers:
          app:
            image:
              repository: ghcr.io/recyclarr/recyclarr
              tag: 8.3.2@sha256:55afe316d3e4e4e3b9120cef7c79436b1b5311f6a18d4ef4b7653e720499c90a

            command: [ "/bin/sh", "-c" ]

            args:
              - "/app/recyclarr/recyclarr state repair --adopt; /app/recyclarr/recyclarr sync"

            envFrom:
              - secretRef:
                  name: recyclarr-secret

    persistence:
      config:
        type: configMap
        name: recyclarr-configmap
        globalMounts:
          - path: /config/configs
            readOnly: true
        defaultMode: 0775
