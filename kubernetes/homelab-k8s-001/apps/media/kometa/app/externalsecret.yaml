---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kometa
spec:
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  refreshInterval: 15m
  target:
    name: kometa-secret
    template:
      engineVersion: v2
      data:
        PLEX_TOKEN: "{{ .PLEX_TOKEN }}"
        RADARR_API_KEY: "{{ .RADARR_API_KEY }}"
        SONARR_API_KEY: "{{ .SONARR_API_KEY }}"
        TAUTULLI_API_KEY: "{{ .TAUTULLI_API_KEY }}"
        TMDB_API_KEY: "{{ .TMDB_API_KEY }}"
        TRAKT_KOMETA_CLIENT_ID: "{{ .TRAKT_KOMETA_CLIENT_ID }}"
        TRAKT_KOMETA_CLIENT_SECRET: "{{ .TRAKT_KOMETA_CLIENT_SECRET }}"
        TRAKT_KOMETA_PIN: "{{ .TRAKT_KOMETA_PIN }}"
  dataFrom:
  - extract:
      key: plex
  - extract:
      key: radarr
  - extract:
      key: sonarr
  - extract:
      key: tautulli
  - extract:
      key: tmdb
  - extract:
      key: trakt
