---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/core/configmap_v1.json
apiVersion: v1
kind: ConfigMap
metadata:
  name: disc-image-splitter-script
data:
  splitter.py: |
    #!/usr/bin/env python3
    """
    disc-image-splitter.py

    Scans download directories for disc image releases (single FLAC + CUE),
    splits them into individual tracks using ffmpeg, and stages them for
    Lidarr import using Lidarr's configured naming conventions:

      Artist folder : {Artist Name}
      Album folder  : {Album Title} ({Release Year})
      Track file    : {Artist Name} - {Album Title} - {track:00} - {Track Title}.flac
    """

    import os
    import re
    import sys
    import subprocess
    from pathlib import Path

    SCAN_DIRS = [
        "/media/downloads/soulseek/complete",
        "/media/downloads/soulseek/failed_imports",
        "/media/downloads/nzbget/completed",
        "/media/downloads/qbittorrent/complete",
    ]

    OUTPUT_DIR = "/media/downloads/disc-split"
    PROCESSED_MARKER = ".disc_split_done"
    ILLEGAL_CHARS = re.compile(r'[\\/:*?"<>|]')
    # Minimum FLAC size for a disc image (150 MB).
    # A full CD album in FLAC is typically 200-400 MB.
    # A single track is typically 20-50 MB — filtering prevents false positives
    # from partial downloads where only the first track + CUE were fetched.
    MIN_DISC_IMAGE_BYTES = 150 * 1024 * 1024
    # Track-number filename pattern — if the FLAC filename starts with a digit
    # sequence it's almost certainly an individual track, not a disc image.
    TRACK_FILENAME_RE = re.compile(r"^\d+[\s.\-_]")


    def sanitize(name):
        return ILLEGAL_CHARS.sub("_", name).strip()


    def cue_time_to_seconds(timestr):
        """Convert CUE MM:SS:FF timestamp to fractional seconds (75 frames/sec)."""
        parts = timestr.split(":")
        minutes = int(parts[0])
        seconds = int(parts[1])
        frames = int(parts[2]) if len(parts) > 2 else 0
        return minutes * 60 + seconds + frames / 75.0


    def parse_cue(cue_path):
        """
        Parse a CUE sheet and return album metadata + ordered track list.
        Handles UTF-8 and Latin-1 encodings.
        """
        for enc in ("utf-8-sig", "utf-8", "latin-1"):
            try:
                content = Path(cue_path).read_text(encoding=enc)
                break
            except UnicodeDecodeError:
                continue
        else:
            print(f"  WARNING: Could not decode CUE file {cue_path}")
            return None

        album_performer = ""
        album_title = ""
        current_file = None
        tracks = []
        current_track = None

        for line in content.splitlines():
            stripped = line.strip()

            # Top-level PERFORMER / TITLE (before first TRACK block)
            if current_track is None:
                m = re.match(r'PERFORMER\s+"(.*)"', stripped)
                if m:
                    album_performer = m.group(1)
                    continue
                m = re.match(r'TITLE\s+"(.*)"', stripped)
                if m:
                    album_title = m.group(1)
                    continue

            m = re.match(r'FILE\s+"(.+?)"\s+', stripped)
            if m:
                current_file = m.group(1)
                continue

            m = re.match(r"TRACK\s+(\d+)\s+AUDIO", stripped)
            if m:
                if current_track is not None:
                    tracks.append(current_track)
                current_track = {
                    "number": int(m.group(1)),
                    "file": current_file,
                    "title": "",
                    "performer": album_performer,
                    "index": None,
                }
                continue

            if current_track is not None:
                m = re.match(r'TITLE\s+"(.*)"', stripped)
                if m:
                    current_track["title"] = m.group(1)
                    continue
                m = re.match(r'PERFORMER\s+"(.*)"', stripped)
                if m:
                    current_track["performer"] = m.group(1)
                    continue
                # Prefer INDEX 01 (track start); ignore INDEX 00 (pre-gap)
                m = re.match(r"INDEX\s+01\s+(\d+:\d+:\d+)", stripped)
                if m:
                    current_track["index"] = cue_time_to_seconds(m.group(1))
                    continue

        if current_track is not None:
            tracks.append(current_track)

        return {"performer": album_performer, "title": album_title, "tracks": tracks}


    def get_flac_year(flac_path):
        """Extract DATE tag from FLAC metadata via ffprobe."""
        try:
            result = subprocess.run(
                [
                    "ffprobe", "-v", "quiet", "-print_format", "json",
                    "-show_format", str(flac_path),
                ],
                capture_output=True, text=True, timeout=30,
            )
            import json
            data = json.loads(result.stdout)
            tags = data.get("format", {}).get("tags", {})
            # Tags may be upper or lower case
            for key in ("DATE", "date", "YEAR", "year"):
                val = tags.get(key, "")
                m = re.search(r"\b(19|20)\d{2}\b", val)
                if m:
                    return m.group(0)
        except Exception:
            pass
        return ""


    def extract_year_from_path(path):
        """Find a 4-digit year in the directory or parent directory name."""
        for part in reversed(path.parts):
            m = re.search(r"\b(19|20)\d{2}\b", part)
            if m:
                return m.group(0)
        return ""


    def split_disc_image(flac_path, cue_path, output_base):
        cue_data = parse_cue(cue_path)
        if not cue_data or not cue_data["tracks"]:
            print(f"  No tracks found in CUE: {cue_path.name}")
            return False

        tracks = cue_data["tracks"]

        # Skip if none of the tracks have a valid INDEX 01 time
        timed_tracks = [t for t in tracks if t["index"] is not None]
        if not timed_tracks:
            print("  No INDEX 01 entries in CUE — cannot determine split points")
            return False

        performer = cue_data["performer"] or flac_path.parent.name
        album_title = cue_data["title"] or flac_path.stem
        year = get_flac_year(flac_path) or extract_year_from_path(flac_path)

        if not performer or not album_title:
            print("  Could not determine performer/album title from CUE")
            return False

        album_dir_name = (
            f"{sanitize(album_title)} ({year})" if year else sanitize(album_title)
        )
        out_dir = output_base / sanitize(performer) / album_dir_name
        out_dir.mkdir(parents=True, exist_ok=True)

        print(f"  Artist : {performer}")
        print(f"  Album  : {album_title}" + (f" ({year})" if year else ""))
        print(f"  Tracks : {len(timed_tracks)}")
        print(f"  Output : {out_dir}")

        success_count = 0
        skip_count = 0

        for i, track in enumerate(timed_tracks):
            start = track["index"]
            # End is the start of the next timed track, or omitted for the last
            next_track = timed_tracks[i + 1] if i + 1 < len(timed_tracks) else None
            end = next_track["index"] if next_track else None

            track_num = f"{track['number']:02d}"
            track_title = sanitize(track["title"]) if track["title"] else f"Track {track_num}"
            track_artist = sanitize(track["performer"] or performer)
            album_san = sanitize(album_title)

            # Lidarr standard track format:
            # {Artist Name} - {Album Title} - {track:00} - {Track Title}
            out_name = f"{track_artist} - {album_san} - {track_num} - {track_title}.flac"
            out_path = out_dir / out_name

            if out_path.exists():
                print(f"    [{track_num}] already exists — skipping")
                skip_count += 1
                continue

            cmd = [
                "ffmpeg", "-y",
                "-i", str(flac_path),
                "-ss", str(start),
            ]
            if end is not None:
                cmd += ["-to", str(end)]
            cmd += [
                "-metadata", f"TITLE={track['title']}",
                "-metadata", f"ARTIST={track['performer'] or performer}",
                "-metadata", f"ALBUMARTIST={performer}",
                "-metadata", f"ALBUM={album_title}",
                "-metadata", f"TRACKNUMBER={track['number']}",
                "-metadata", f"TRACKTOTAL={len(timed_tracks)}",
            ]
            if year:
                cmd += ["-metadata", f"DATE={year}"]
            cmd += ["-c:a", "copy", str(out_path)]

            print(f"    [{track_num}] {track_title}")
            result = subprocess.run(cmd, capture_output=True, text=True, timeout=300)

            if result.returncode != 0:
                print(f"    ERROR splitting track {track_num}: {result.stderr[-300:]}")
                continue

            success_count += 1

        print(f"  Split {success_count} tracks" +
              (f", skipped {skip_count} existing" if skip_count else ""))
        return success_count > 0 or skip_count == len(timed_tracks)


    def find_disc_images(scan_dir):
        """
        Recursively find directories containing exactly one FLAC and at least one CUE.
        Skips directories already processed (marked with PROCESSED_MARKER).
        """
        results = []
        scan_path = Path(scan_dir)

        if not scan_path.exists():
            return results

        for root, dirs, files in os.walk(scan_path):
            # Skip hidden directories (e.g., .git)
            dirs[:] = [d for d in dirs if not d.startswith(".")]

            root_path = Path(root)
            if (root_path / PROCESSED_MARKER).exists():
                continue

            flacs = [f for f in files if f.lower().endswith(".flac")]
            cues = [f for f in files if f.lower().endswith(".cue")]

            if len(flacs) == 1 and cues:
                flac_name = flacs[0]
                flac_path = root_path / flac_name

                # Skip if the filename looks like a numbered track — it's a
                # partial download, not a disc image.
                if TRACK_FILENAME_RE.match(flac_name):
                    continue

                # Skip files that are too small to be a full-album disc image.
                try:
                    if flac_path.stat().st_size < MIN_DISC_IMAGE_BYTES:
                        continue
                except OSError:
                    continue

                # Best-match CUE: same stem as FLAC, otherwise first CUE found
                flac_stem = Path(flac_name).stem.lower()
                matched_cue = next(
                    (c for c in cues if Path(c).stem.lower() == flac_stem),
                    cues[0],
                )
                results.append(
                    (root_path, flac_path, root_path / matched_cue)
                )

        return results


    def main():
        output_base = Path(OUTPUT_DIR)
        output_base.mkdir(parents=True, exist_ok=True)

        total_found = 0
        total_processed = 0
        total_failed = 0

        for scan_dir in SCAN_DIRS:
            print(f"\n{'='*60}")
            print(f"Scanning: {scan_dir}")
            print(f"{'='*60}")

            disc_images = find_disc_images(scan_dir)

            if not disc_images:
                print("  No unprocessed disc images found.")
                continue

            for dir_path, flac_path, cue_path in disc_images:
                total_found += 1
                print(f"\nFound: {dir_path.name}")
                print(f"  FLAC: {flac_path.name}")
                print(f"  CUE : {cue_path.name}")

                try:
                    success = split_disc_image(flac_path, cue_path, output_base)
                    if success:
                        (dir_path / PROCESSED_MARKER).touch()
                        print("  Marked as processed.")
                        total_processed += 1
                    else:
                        total_failed += 1
                except subprocess.TimeoutExpired:
                    print(f"  ERROR: ffmpeg timed out processing {flac_path.name}")
                    total_failed += 1
                except Exception as exc:
                    print(f"  ERROR: {exc}")
                    total_failed += 1

        print(f"\n{'='*60}")
        print(f"SUMMARY")
        print(f"{'='*60}")
        print(f"Found:     {total_found}")
        print(f"Processed: {total_processed}")
        print(f"Failed:    {total_failed}")

        if total_processed > 0:
            print(f"\nSplit tracks are staged in: {OUTPUT_DIR}")
            print("In Lidarr: Wanted -> Manual Import -> choose the disc-split folder")


    if __name__ == "__main__":
        main()
