# RackPeek Configuration for dmfrey's Homelab
# Generated by Gemini

# ---------------------------------------------------
# Racks - Defines the physical racks
# ---------------------------------------------------
racks:
  - name: "Main Server Rack"
    height: 12 # A smaller rack for servers/storage
    location: "Homelab"
  - name: "Unifi Rack 1"
    manufacturer: "Ubiquiti"
    model: "Toolless Mini Rack"
    height: 6
    location: "Homelab"
  - name: "Unifi Rack 2"
    manufacturer: "Ubiquiti"
    model: "Toolless Mini Rack"
    height: 6
    location: "Homelab"

# ---------------------------------------------------
# Networks - Defines VLANs and Subnets
# ---------------------------------------------------
networks:
  - name: "Unifi Control Plane"
    vlan_id: 1
    subnet: "192.168.86.0/24"
    description: "For managing Unifi devices."
  - name: "Family"
    vlan_id: 10
    subnet: "192.168.10.0/24"
    description: "For phones, tablets, laptops, printers."
  - name: "Cilium LB Pool"
    vlan_id: 29
    subnet: "192.168.29.0/24"
    description: "For Kubernetes Load Balancer services."
  - name: "Homelab"
    vlan_id: 30
    subnet: "192.168.30.0/24"
    description: "For Kubernetes nodes and servers."
  - name: "IoT"
    vlan_id: 50
    subnet: "192.168.50.0/24"
    description: "For smart home devices."
  - name: "VPN"
    vlan_id: 90
    subnet: "192.168.90.0/24"
    description: "Dedicated VPN network."
  - name: "Guest"
    vlan_id: 101
    subnet: "192.168.101.0/24"
    description: "For guest devices."

# ---------------------------------------------------
# Device Roles & Templates
# ---------------------------------------------------
device_roles:
  - name: "Kubernetes Control Plane & Worker"
    color: "#326CE5" # Kubernetes Blue
  - name: "Core Router"
    color: "#0067B8" # Ubiquiti Blue
  - name: "Core Switch"
    color: "#00A2E0" # Ubiquiti Light Blue
  - name: "Distribution Switch"
    color: "#00A2E0"
  - name: "Network Attached Storage"
    color: "#D82C2C" # QNAP Red
  - name: "Power Device"
    color: "#F0B429" # Yellow/Gold for Power
  - name: "Patch Panel"
    color: "#767676" # Grey

device_templates:
  - name: "GEEKOM Mini IT13 Node"
    manufacturer: "GEEKOM"
    model: "Mini IT13"
    height: 1 # Assuming 1U shelf or stacked
    metadata:
      cpu: "Intel 13th Gen"
      disks:
        - "1x SATA SSD (OS & etcd)"
        - "1x M.2 NVMe (Rook-Ceph)"
        - "1x M.2 SSD (OpenEBS)"

# ---------------------------------------------------
# Devices - Defines the physical hardware
# ---------------------------------------------------
devices:
  # === Unifi Rack 1 ===
  - name: "Unifi Cable Internet Modem"
    role: "Core Router"
    manufacturer: "Ubiquiti"
    model: "UCI"
    rack: "Unifi Rack 1"
    position: 1
    height: 1
  - name: "UDM-SE"
    role: "Core Router"
    manufacturer: "Ubiquiti"
    model: "Unifi Dream Machine SE"
    rack: "Unifi Rack 1"
    position: 2
    height: 1
    interfaces:
      - name: "SFP Port 11 (LAN)"
        connection: "USW-Pro-Max-24"
        connection_port: "SFP Port 25"
        description: "10GbE DAC to Core Switch"
  - name: "Keystone Patch Panel"
    role: "Patch Panel"
    manufacturer: "Ubiquiti"
    model: "24-Port Blank Keystone Patch Panel"
    rack: "Unifi Rack 1"
    position: 3
    height: 1
  - name: "USW-Pro-Max-24"
    role: "Core Switch"
    manufacturer: "Ubiquiti"
    model: "USW Pro Max 24"
    rack: "Unifi Rack 1"
    position: 4
    height: 1
    interfaces:
      - name: "SFP Port 25"
        connection: "UDM-SE"
        connection_port: "SFP Port 11 (LAN)"
      - name: "SFP Port 26"
        connection: "QNAP-TS-462"
        connection_port: "10GbE Port"
      - name: "Port 19"
        connection: "k8s-0"
        connection_port: "eth0"
      - name: "Port 20"
        connection: "k8s-1"
        connection_port: "eth0"
      - name: "Port 21"
        connection: "k8s-2"
        connection_port: "eth0"

  # === Unifi Rack 2 ===
  - name: "PDU-Pro"
    role: "Power Device"
    manufacturer: "Ubiquiti"
    model: "Unifi UPS PDU Pro"
    rack: "Unifi Rack 2"
    position: 1
    height: 2
  - name: "UPS-2U"
    role: "Power Device"
    manufacturer: "Ubiquiti"
    model: "Unifi UPS 2U"
    rack: "Unifi Rack 2"
    position: 3
    height: 2
  - name: "Blank Panel"
    role: "Patch Panel"
    rack: "Unifi Rack 2"
    position: 5
    height: 1
  - name: "RPS"
    role: "Power Device"
    manufacturer: "Ubiquiti"
    model: "Unifi USP RPS"
    rack: "Unifi Rack 2"
    position: 6
    height: 1

  # === Devices not in Unifi Racks ===
  - name: "USW-Ultra-8"
    role: "Distribution Switch"
    manufacturer: "Ubiquiti"
    model: "USW Ultra 8 Port"
    interfaces:
      - name: "Uplink"
        connection: "USW-Pro-Max-24"
  - name: "USW-Flex"
    role: "Distribution Switch"
    manufacturer: "Ubiquiti"
    model: "USW Flex"
    interfaces:
      - name: "Uplink"
        connection: "USW-Ultra-8"

  # === Servers & Storage (in Main Server Rack) ===
  - name: "k8s-0"
    role: "Kubernetes Control Plane & Worker"
    template: "GEEKOM Mini IT13 Node"
    rack: "Main Server Rack"
    metadata:
      placement: "On shelf above Main Server Rack"
    interfaces:
      - name: "eth0"
        ip: "192.168.30.10"
        network: "Homelab"
        connection: "USW-Pro-Max-24"
        connection_port: "Port 19"
  - name: "k8s-1"
    role: "Kubernetes Control Plane & Worker"
    template: "GEEKOM Mini IT13 Node"
    rack: "Main Server Rack"
    metadata:
      placement: "On shelf above Main Server Rack"
    interfaces:
      - name: "eth0"
        ip: "192.168.30.11"
        network: "Homelab"
        connection: "USW-Pro-Max-24"
        connection_port: "Port 20"
  - name: "k8s-2"
    role: "Kubernetes Control Plane & Worker"
    template: "GEEKOM Mini IT13 Node"
    rack: "Main Server Rack"
    metadata:
      placement: "On shelf above Main Server Rack"
    interfaces:
      - name: "eth0"
        ip: "192.168.30.12"
        network: "Homelab"
        connection: "USW-Pro-Max-24"
        connection_port: "Port 21"
  - name: "QNAP-TS-462"
    role: "Network Attached Storage"
    manufacturer: "QNAP"
    model: "TS-462"
    rack: "Main Server Rack"
    metadata:
      placement: "On shelf above Main Server Rack"
    height: 4
    interfaces:
      - name: "10GbE Port"
        network: "Homelab"
        ip_addresses:
          - "192.168.30.5"
        connection: "USW-Pro-Max-24"
        connection_port: "SFP Port 26"

# ---------------------------------------------------
# Services - Defines logical services running on devices
# ---------------------------------------------------
services:
  - name: "Kubernetes Cluster"
    description: "Primary Talos-based Kubernetes cluster."
    nodes:
      - "k8s-0"
      - "k8s-1"
      - "k8s-2"
    metadata:
      version: "v1.35.0 (Talos)"
      cni: "Cilium"
  - name: "Rook-Ceph Storage"
    description: "Distributed block and file storage provided by Rook-Ceph."
    nodes:
      - "k8s-0"
      - "k8s-1"
      - "k8s-2"
    metadata:
      backend: "NVMe SSDs on each node"
  - name: "OpenEBS Storage"
    description: "Local storage for specific applications."
    nodes:
      - "k8s-0"
      - "k8s-1"
      - "k8s-2"
    metadata:
      backend: "M.2 SSDs on each node"
