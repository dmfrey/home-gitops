---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: home-projects
spec:
  interval: 1h
  path: "./kubernetes/homelab-k8s-001/apps/self-hosted/home-projects/app"
  postBuild:
    substitute:
      APP: home-projects
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: self-hosted
  wait: true
