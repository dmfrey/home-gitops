---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kopia

spec:

  chartRef:
    kind: OCIRepository
    name: kopia

  interval: 1h

  values:

    controllers:

      kopia:
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              repository: ghcr.io/home-operations/kopia
              tag: 0.22.3@sha256:17ab64542280197a5368247deaefadc3e3bbe15714ab666c2455a06824e86efd

            env:
              KOPIA_WEB_ENABLED: true
              KOPIA_WEB_PORT: &port 80
              TZ: America/New_York
              KOPIA_CONFIG_PATH: /config/repository.config
              KOPIA_LOG_DIR: /config/logs
              KOPIA_CACHE_DIR: /config/cache
              KOPIA_CHECK_FOR_UPDATES: "false"

            envFrom:
              - secretRef:
                  name: kopia-secret

            args:
              - --without-password
              - --disable-csrf-token-checks
              - --log-level=debug

            probes:
              liveness: &probes
                enabled: false # true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes

            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}

      maintenance:
        type: cronjob
        cronjob:
          schedule: "0 4 * * *"
          concurrencyPolicy: Forbid
          failedJobsHistory: 1
          successfulJobsHistory: 1
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/kopia
              tag: 0.22.3@sha256:17ab64542280197a5368247deaefadc3e3bbe15714ab666c2455a06824e86efd
            env:
              TZ: America/New_York
              KOPIA_CONFIG_PATH: /config/repository.config
              KOPIA_LOG_DIR: /config/logs
              KOPIA_CACHE_DIR: /config/cache
            envFrom:
              - secretRef:
                  name: kopia-secret
            command:
              - /bin/sh
              - -c
              - |
                kopia maintenance run --full
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}

      maintenance-quick:
        type: cronjob
        cronjob:
          schedule: "0 */4 * * *"
          concurrencyPolicy: Forbid
          failedJobsHistory: 1
          successfulJobsHistory: 1
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/kopia
              tag: 0.22.3@sha256:17ab64542280197a5368247deaefadc3e3bbe15714ab666c2455a06824e86efd
            env:
              TZ: America/New_York
              KOPIA_CONFIG_PATH: /config/repository.config
              KOPIA_LOG_DIR: /config/logs
              KOPIA_CACHE_DIR: /config/cache
            envFrom:
              - secretRef:
                  name: kopia-secret
            command:
              - /bin/sh
              - -c
              - |
                kopia maintenance run
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}

      maintenance-verify:
        type: cronjob
        cronjob:
          schedule: "0 5 * * 0"
          concurrencyPolicy: Forbid
          failedJobsHistory: 1
          successfulJobsHistory: 1
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/kopia
              tag: 0.22.3@sha256:17ab64542280197a5368247deaefadc3e3bbe15714ab666c2455a06824e86efd
            env:
              TZ: America/New_York
              KOPIA_CONFIG_PATH: /config/repository.config
              KOPIA_LOG_DIR: /config/logs
              KOPIA_CACHE_DIR: /config/cache
            envFrom:
              - secretRef:
                  name: kopia-secret
            command:
              - /bin/sh
              - -c
              - |
                kopia repository verify --deep
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: kopia
        ports:
          http:
            port: *port

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Infrastructure
          gethomepage.dev/name: Kopia
          gethomepage.dev/icon: kopia.png
          gethomepage.dev/description: Backup and Restore for PVCs.
          gethomepage.dev/widget.type: kopia
          gethomepage.dev/widget.url: "http://kopia.volsync-system.svc.cluster.local"
        hostnames:
          - "{{ .Release.Name }}.dmfrey.com"

        parentRefs:
          - name: envoy-internal
            namespace: network

    configMaps:
      config:
        data:
          repository.config: |-
            {
              "storage": {
                "type": "filesystem",
                "config": {
                  "path": "/repository"
                }
              },
              "hostname": "volsync.{{ .Release.Namespace }}.svc.cluster.local",
              "username": "volsync",
              "description": "volsync",
              "enableActions": false
            }

    persistence:
      config-file:
        type: configMap
        identifier: config
        globalMounts:
          - path: /config/repository.config
            subPath: repository.config

      repository:
        type: nfs
        server: nas.internal
        path: /VolsyncKopia
        globalMounts:
          - path: /repository

      tmpfs:
        type: emptyDir
        advancedMounts:
          kopia:
            app:
              - path: /config
          maintenance:
            app:
              - path: /config
          maintenance-quick:
            app:
              - path: /config
          maintenance-verify:
            app:
              - path: /config
