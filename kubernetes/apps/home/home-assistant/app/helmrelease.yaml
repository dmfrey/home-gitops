---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant
spec:
  chartRef:
    kind: OCIRepository
    name: home-assistant
  interval: 1h
  values:
    controllers:
      home-assistant:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
          secret.reloader.stakater.com/reload: home-assistant-cnpg-app
        initContainers:
          venv-cleanup:
            image:
              repository: ghcr.io/home-operations/home-assistant
              tag: 2026.4.1@sha256:1000851ce4d5bf2f6790bfc8b9052daa2c33a84f92e0bad7d60e0a9333ff4dc2
            command:
              - /bin/sh
              - -c
              - |
                CURRENT=$(python3 -c "from homeassistant.const import __version__; print(__version__)" 2>/dev/null || echo "unknown")
                VERSION_FILE=/config/.venv/.ha-version
                if [ -f "$VERSION_FILE" ] && [ "$(cat $VERSION_FILE)" = "$CURRENT" ]; then
                  echo "HA $CURRENT unchanged, keeping .venv cache"
                else
                  echo "HA version changed to $CURRENT, clearing .venv cache"
                  rm -rf /config/.venv/*
                fi
                echo "$CURRENT" > "$VERSION_FILE"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/home-assistant
              tag: 2026.4.1@sha256:1000851ce4d5bf2f6790bfc8b9052daa2c33a84f92e0bad7d60e0a9333ff4dc2
            env:
              TZ: America/New_York
              GIT_SSH_COMMAND: "ssh -i /config/.ssh/deploy_key -o StrictHostKeyChecking=no"
              HASS_RECORDER_DB_URL:
                valueFrom:
                  secretKeyRef:
                    name: home-assistant-cnpg-app
                    key: uri
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
          codeserver:
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.113.0
            args:
              - "/config"
              - --auth
              - "none"
              - --user-data-dir
              - "/config/.vscode"
              - --extensions-dir
              - "/config/.vscode"
            env:
              TZ: America/New_York
              HASS_SERVER: http://localhost:8123
              HASS_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: "{{ .Release.Name }}-secret"
                    key: CODE_SERVER_ADDON_HASS_TOKEN
              GIT_SSH_COMMAND: "ssh -i /config/.ssh/deploy_key -o StrictHostKeyChecking=no"
    defaultPodOptions:
      annotations:
        k8s.v1.cni.cncf.io/networks: |
          [{
            "name": "iot-vlan",
            "namespace": "kube-system",
            "ips": ["192.168.50.4/24", "${IPV6_IOT_PREFIX}:4::1/64"],
            "mac": "c6:2a:0a:f1:3d:f8"
          }]
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups:
          - 568
    service:
      app:
        ports:
          http:
            appProtocol: kubernetes.io/ws
            port: &port 8123
      code:
        ports:
          http:
            port: &codePort 8080
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 200"]
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Home
          gethomepage.dev/name: Home Assistant
          gethomepage.dev/icon: home-assistant.png
          gethomepage.dev/description: Home Automation Software
          gethomepage.dev/widget.type: homeassistant
          gethomepage.dev/widget.url: https://home.dmfrey.com
          gethomepage.dev/widget.key: "{{ `{{HOMEPAGE_VAR_HASS_TOKEN}}` }}"
        hostnames:
          - home.dmfrey.com
        parentRefs:
          - name: envoy-external
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *port
      code:
        hostnames:
          - hass-code.dmfrey.com
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Home
          gethomepage.dev/name: Home Assistant Code Server
          gethomepage.dev/icon: vscode.png
          gethomepage.dev/description: Online Code Editor
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: code
                port: *codePort
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /config
      config-cache:
        existingClaim: "{{ .Release.Name }}-cache"
        globalMounts:
          - path: /config/.venv
      llmvision:
        existingClaim: home-assistant-llmvision
        advancedMounts:
          home-assistant:
            app:
              - path: /config/www/llmvision
      media:
        type: nfs
        server: nas.internal
        path: /media
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /config/tts
            subPath: tts
          - path: /tmp
            subPath: tmp
      backups:
        enabled: true
        type: nfs
        server: nas.internal
        path: /homeassistant
        advancedMounts:
          home-assistant:
            app:
              - path: /config/backups
                readOnly: false
      deploy-key:
        type: secret
        name: "{{ .Release.Name }}-secret"
        items:
          - key: HASS_DEPLOY_KEY
            path: deploy_key
        defaultMode: 0600
        advancedMounts:
          home-assistant:
            app:
              - path: /config/.ssh
                readOnly: true
            codeserver:
              - path: /config/.ssh
                readOnly: true
