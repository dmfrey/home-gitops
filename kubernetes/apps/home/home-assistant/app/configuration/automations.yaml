- id: game_time_manager
  alias: Game Time — Calendar-Driven Toggle
  description: Turns on game-specific flags and the global game_time boolean when a sports calendar event starts; clears them and restores ambient lighting when the game ends.
  triggers:
    - entity_id:
        - calendar.penn_state_nittany_lions_football
        - calendar.philadelphia_eagles
        - calendar.philadelphia_flyers
        - calendar.philadelphia_phillies
      to: 'on'
      id: game_started
      trigger: state
    - entity_id:
        - calendar.penn_state_nittany_lions_football
        - calendar.philadelphia_eagles
        - calendar.philadelphia_flyers
        - calendar.philadelphia_phillies
      to: 'off'
      id: game_ended
      trigger: state
    - trigger: state
      entity_id: input_select.home_mode
      to: Away
      id: home_away
    - trigger: state
      entity_id: input_select.home_mode
      to: Home
      id: home_return
  conditions: []
  actions:
    - variables:
        team_slug: '{% set id = trigger.entity_id %}{% if ''penn_state'' in id %}penn_st{%- elif ''eagles'' in id %}eagles{%- elif ''flyers'' in id %}flyers{%- elif ''phillies'' in id %}phillies{%- else %}unknown{%- endif %}'
        specific_boolean_entity_id: input_boolean.game_time_{{ team_slug }}
        preset_id_map:
          eagles: 36246dc7-718b-44c5-a131-ece43202e25a
          flyers: b7873f7c-fad4-486d-8770-c95f7117f489
          penn_st: 3e158682-cafe-47d8-8702-edc117c1fd2d
          phillies: 9fbce023-52f2-447c-953f-c72d5a173d8c
        preset_id_to_stop: '{{ preset_id_map[team_slug] }}'
    - choose:
        - conditions:
            - condition: trigger
              id: game_started
          sequence:
            - target:
                entity_id: '{{ specific_boolean_entity_id }}'
              action: input_boolean.turn_on
            - target:
                entity_id: input_boolean.game_time
              action: input_boolean.turn_on
        - conditions:
            - condition: trigger
              id: game_ended
          sequence:
            - target:
                entity_id: '{{ specific_boolean_entity_id }}'
              action: input_boolean.turn_off
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ not is_state('input_boolean.game_time_phillies', 'on')\n   and not is_state('input_boolean.game_time_eagles', 'on')\n   and not is_state('input_boolean.game_time_flyers', 'on')\n   and not is_state('input_boolean.game_time_penn_st', 'on') }}\n"
                  sequence:
                    - target:
                        entity_id: input_boolean.game_time
                      action: input_boolean.turn_off
                    - action: scene_presets.stop_all_dynamic_scenes
                      data: {}
                    - delay: 00:00:01
                    - target:
                        entity_id:
                          - automation.apply_ambient_outside
                      action: automation.trigger
              default:
                - target:
                    entity_id: automation.apply_game_time_settings
                  action: automation.trigger
        - conditions:
            - condition: trigger
              id: home_away
            - condition: state
              entity_id: input_boolean.game_time
              state: 'on'
          sequence:
            - target:
                entity_id: input_boolean.game_time
              action: input_boolean.turn_off
            - action: scene_presets.stop_all_dynamic_scenes
              data: {}
            - delay: 00:00:01
            - target:
                entity_id:
                  - automation.apply_ambient_outside
              action: automation.trigger
        - conditions:
            - condition: trigger
              id: home_return
            - condition: template
              value_template: "{{ is_state('input_boolean.game_time_phillies', 'on')\n   or is_state('input_boolean.game_time_eagles', 'on')\n   or is_state('input_boolean.game_time_flyers', 'on')\n   or is_state('input_boolean.game_time_penn_st', 'on') }}\n"
          sequence:
            - target:
                entity_id: input_boolean.game_time
              action: input_boolean.turn_on
            - target:
                entity_id: automation.apply_game_time_settings
              action: automation.trigger
  mode: single
- id: holiday_time_manager
  alias: Holiday Lights — Calendar-Driven Toggle
  description: Activates holiday lighting flags based on the lights calendar; clears them and restores ambient when the event ends.
  triggers:
    - entity_id: calendar.lights_calendar
      event: start
      offset: 0:0:0
      id: event_start
      trigger: calendar
    - entity_id: calendar.lights_calendar
      event: end
      offset: 0:0:0
      id: event_end
      trigger: calendar
    - entity_id: calendar.holidays_in_united_states
      event: start
      offset: 0:0:0
      id: event_start
      trigger: calendar
    - entity_id: calendar.holidays_in_united_states
      event: end
      offset: 0:0:0
      id: event_end
      trigger: calendar
  conditions:
    - condition: template
      value_template: >-
        {{ trigger.calendar_event.summary in ['Christmas Lights', 'Fall Lights', "St. Patrick's Day", "Valentine's Day", 'Halloween', 'Memorial Day', 'Independence Day', 'Independence Day (substitute)'] }}
  actions:
    - variables:
        summary_slug_map:
          Christmas Lights: christmas_lights
          Fall Lights: fall_lights
          "St. Patrick's Day": st_patrick_s_day
          "Valentine's Day": valentine_s_day
          Halloween: halloween
          Memorial Day: america
          Independence Day: america
          Independence Day (substitute): america
        holiday_summary_slug: '{{ summary_slug_map[trigger.calendar_event.summary] | default(''unknown'') }}'
        specific_boolean_entity_id: 'input_boolean.holiday_time_{{ holiday_summary_slug }}'
        holiday_preset_id_map:
          christmas_lights: bb45dfdd-2ac8-4327-b6be-6fc809bd541f
          fall_lights: a2fc579f-71e5-47a1-af9d-43e8edd91c6e
          st_patrick_s_day: fa2f3a7f-7648-42f1-88b7-38692f3fcb60
          valentine_s_day: a65a2815-52fb-4748-8e02-b607f96f70ea
          halloween: 074338f3-f7f3-4402-9f30-46ac70e5a0e6
          america: 9fbce023-52f2-447c-953f-c72d5a173d8c
        preset_id_to_stop: '{{ holiday_preset_id_map[holiday_summary_slug] if holiday_summary_slug in holiday_preset_id_map else none }}'
    - choose:
        - conditions:
            - condition: trigger
              id: event_start
          sequence:
            - target:
                entity_id: '{{ specific_boolean_entity_id }}'
              action: input_boolean.turn_on
            - target:
                entity_id: input_boolean.holiday_time
              action: input_boolean.turn_on
        - conditions:
            - condition: trigger
              id: event_end
          sequence:
            - target:
                entity_id: '{{ specific_boolean_entity_id }}'
              action: input_boolean.turn_off
            - target:
                entity_id: input_boolean.holiday_time
              action: input_boolean.turn_off
            - action: scene_presets.stop_all_dynamic_scenes
              data: {}
            - delay: 00:00:01
            - target:
                entity_id:
                  - automation.apply_ambient_inside
                  - automation.apply_ambient_outside
              action: automation.trigger
  mode: single
- id: apply_holiday_time
  alias: Holiday Lights — Start Dynamic Scene
  description: Activates the holiday dynamic light scene for holiday-labeled lights when holiday time is on. Also restarts the scene at 8 AM and on family arrival after the Good Night shutdown.
  mode: restart
  triggers:
    - trigger: state
      entity_id:
        - input_boolean.holiday_time_christmas
        - input_boolean.holiday_time_fall
        - input_boolean.holiday_time_st_patrick_s_day
        - input_boolean.holiday_time_valentine_s_day
        - input_boolean.holiday_time_halloween
        - input_boolean.holiday_time_america
      to: 'on'
    - trigger: time
      at: 08:00:00
    - trigger: state
      entity_id: binary_sensor.family_home
      to: 'on'
  conditions:
    - condition: template
      value_template: '{{ is_state(''input_boolean.holiday_time'', ''on'') }}'
  actions:
    - variables:
        holiday_slug: '{% if is_state(''input_boolean.holiday_time_christmas'', ''on'') %} christmas_lights {% elif is_state(''input_boolean.holiday_time_fall'', ''on'') %} fall_lights {% elif is_state(''input_boolean.holiday_time_st_patrick_s_day'', ''on'') %} st_patrick_s_day {% elif is_state(''input_boolean.holiday_time_valentine_s_day'', ''on'') %} valentine_s_day {% elif is_state(''input_boolean.holiday_time_halloween'', ''on'') %} halloween {% elif is_state(''input_boolean.holiday_time_america'', ''on'') %} america {% else %} unknown {% endif %}'
        start_preset_id_map:
          christmas_lights: bb45dfdd-2ac8-4327-b6be-6fc809bd541f
          fall_lights: a2fc579f-71e5-47a1-af9d-43e8edd91c6e
          st_patrick_s_day: fa2f3a7f-7648-42f1-88b7-38692f3fcb60
          valentine_s_day: a65a2815-52fb-4748-8e02-b607f96f70ea
          halloween: 074338f3-f7f3-4402-9f30-46ac70e5a0e6
          america: 9fbce023-52f2-447c-953f-c72d5a173d8c
        selected_preset_id: '{{ start_preset_id_map[holiday_slug | trim] | default(none) }}'
    - if: '{{ selected_preset_id is not none }}'
      then:
        - action: scene_presets.start_dynamic_scene
          data:
            preset_id: '{{ selected_preset_id }}'
            targets:
              label_id: holiday
            transition: 45
            interval: 60
            brightness: 255
- id: create_holiday_calendar_events
  alias: Holiday Calendar — Create Annual Light Season Entries
  description: On January 1st, creates Fall Lights and Christmas Lights calendar entries based on Thanksgiving for the current year.
  triggers:
    - trigger: time
      at: '00:01:00'
  conditions:
    - condition: template
      value_template: '{{ now().month == 1 and now().day == 1 }}'
  actions:
    - variables:
        nov1: '{{ strptime(now().year | string ~ ''-11-01'', ''%Y-%m-%d'') }}'
        thanksgiving: '{{ nov1 + timedelta(days=(3 - nov1.weekday()) % 7 + 21) }}'
        black_friday: '{{ thanksgiving + timedelta(days=1) }}'
        next_jan1: '{{ strptime((now().year + 1) | string ~ ''-01-01'', ''%Y-%m-%d'') }}'
        christmas_end: '{{ next_jan1 + timedelta(days=(7 - next_jan1.weekday()) % 7 + 14) }}'
    - action: calendar.create_event
      target:
        entity_id: calendar.lights_calendar
      data:
        summary: Fall Lights
        start_date: '{{ now().year | string ~ ''-11-01'' }}'
        end_date: '{{ black_friday.strftime(''%Y-%m-%d'') }}'
    - action: calendar.create_event
      target:
        entity_id: calendar.lights_calendar
      data:
        summary: Christmas Lights
        start_date: '{{ black_friday.strftime(''%Y-%m-%d'') }}'
        end_date: '{{ christmas_end.strftime(''%Y-%m-%d'') }}'
  mode: single
- id: home_mode_manager
  alias: Home Mode — Presence & Schedule Manager
  description: Transitions Home Mode between Home, Away, and Night based on presence, time, and the Good Night signal.
  mode: restart
  triggers:
    - trigger: state
      entity_id: group.family
      to: home
      id: presence_home
    - trigger: state
      entity_id: group.family
      to: not_home
      id: presence_away
    - trigger: time
      at: 00:00:00
      id: time_night
    - trigger: time
      at: 05:30:00
      id: time_home
    - trigger: state
      entity_id: input_boolean.good_night
      to: 'on'
      id: good_night_on
  conditions:
    - condition: or
      conditions:
        - condition: template
          value_template: '{{ not is_state(''input_select.home_mode'', ''Vacation'') }}'
        - condition: trigger
          id: good_night_on
  actions:
    - choose:
        - conditions:
            - condition: or
              conditions:
                - condition: trigger
                  id: good_night_on
                - condition: and
                  conditions:
                    - condition: trigger
                      id: time_night
                    - condition: state
                      entity_id: group.family
                      state: home
          sequence:
            - action: input_select.select_option
              target:
                entity_id: input_select.home_mode
              data:
                option: Night
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.good_night
        - conditions:
            - condition: trigger
              id: time_home
            - condition: state
              entity_id: group.family
              state: home
          sequence:
            - action: input_select.select_option
              target:
                entity_id: input_select.home_mode
              data:
                option: Home
        - conditions:
            - condition: trigger
              id: presence_home
            - condition: not
              conditions:
                - condition: state
                  entity_id: input_select.home_mode
                  state: Night
          sequence:
            - action: input_select.select_option
              target:
                entity_id: input_select.home_mode
              data:
                option: Home
        - conditions:
            - condition: trigger
              id: presence_away
          sequence:
            - action: input_select.select_option
              target:
                entity_id: input_select.home_mode
              data:
                option: Away
            - action: persistent_notification.create
              data:
                title: House Empty
                message: Everyone has left the house.
                notification_id: house_empty_reset
- id: security_lock_doors_on_mode_change
  alias: Lock All Doors — Away or Night
  description: Locks all exterior doors when Home Mode transitions to Away or Night. The workshop lights are handled separately by the workshop lock automation.
  mode: single
  triggers:
    - trigger: state
      entity_id: input_select.home_mode
      to:
        - Away
        - Night
  actions:
    - action: lock.lock
      target:
        entity_id:
          - lock.front_porch_lock
          - lock.laundry_room
          - lock.workshop_smart_lock
- id: security_area_aware_motion_brighten
  alias: Outdoor Motion — Brighten Security Lights
  description: Brightens outdoor security lights in the triggered area to 60% when motion is detected at night. Returns lights to normal 10 minutes after clearing.
  mode: parallel
  max: 10
  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.garden_sensor_occupancy
        - binary_sensor.back_yard_sensor_occupancy
        - binary_sensor.side_yard_sensor_occupancy
        - binary_sensor.front_yard_sensor_occupancy
      to: 'on'
  conditions:
    - condition: state
      entity_id: input_boolean.panic_mode
      state: 'off'
    - condition: state
      entity_id: input_select.home_mode
      state: Night
  actions:
    - variables:
        trigger_area: '{{ area_id(trigger.entity_id) }}'
        target_entities: '{{ label_entities(''security_motion'') | select(''in'', area_entities(trigger_area)) | list }}'
    - if:
        - condition: template
          value_template: '{{ target_entities | count > 0 }}'
      then:
        - action: light.turn_on
          target:
            entity_id: '{{ target_entities }}'
          data:
            brightness_pct: 60
        - wait_template: '{{ is_state(trigger.entity_id, ''off'') }}'
        - delay: 00:10:00
        - condition: template
          value_template: "{{ is_state(trigger.entity_id, 'off') and\n   (as_timestamp(now()) - as_timestamp(states[trigger.entity_id].last_changed)) >= 600 }}"
        - repeat:
            for_each: '{{ target_entities }}'
            sequence:
              - action: light.turn_on
                target:
                  entity_id: '{{ repeat.item }}'
                data:
                  brightness_pct: '{{ 40 if ''security_ambient'' in labels(repeat.item) else 0 }}'
- id: panic_mode_manager
  alias: Panic Mode — Emergency Lighting & Alerts
  description: Activates full-brightness emergency lighting and critical alerts on panic. Physical triple-tap toggles it; mobile action or toggle clears it.
  mode: single
  triggers:
    - trigger: state
      entity_id: input_boolean.panic_mode
      id: panic_toggle
    - trigger: template
      value_template: "{{ states.binary_sensor\n   | selectattr('entity_id', 'search', 'protect_(smoke|carbon_monoxide|heat)')\n   | selectattr('state', 'eq', 'on')\n   | list | count > 0 }}"
      id: life_safety_alert
    - trigger: mqtt
      topic: zigbee2mqtt/+/action
      payload: up_triple
      id: physical_panic
    - trigger: event
      event_type: mobile_app_notification_action
      event_data:
        action: PANIC_ALL_CLEAR
      id: mobile_all_clear
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: physical_panic
          sequence:
            - action: input_boolean.toggle
              target:
                entity_id: input_boolean.panic_mode
        - conditions:
            - condition: trigger
              id: mobile_all_clear
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.panic_mode
    - choose:
        - conditions:
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_boolean.panic_mode
                  state: 'on'
                - condition: trigger
                  id: life_safety_alert
          sequence:
            - action: light.turn_on
              target:
                label_id:
                  - ambient
                  - security_ambient
                  - auto_bright
              data:
                brightness_pct: 100
                color_temp_kelvin: 4000
                transition: 1
            - choose:
                - conditions:
                    - condition: trigger
                      id: life_safety_alert
                  sequence:
                    - action: lock.unlock
                      target:
                        entity_id:
                          - lock.front_porch_lock
                          - lock.laundry_room
                - conditions:
                    - condition: or
                      conditions:
                        - condition: trigger
                          id: panic_toggle
                        - condition: trigger
                          id: physical_panic
                  sequence:
                    - action: lock.lock
                      target:
                        entity_id:
                          - lock.front_porch_lock
                          - lock.laundry_room
            - action: script.send_notification
              data:
                tier: 1
                title: "🚨 EMERGENCY: Panic Mode Active"
                message: Emergency lighting triggered! Manual panic or life-safety alert detected.
                extra_data:
                  actions:
                    - action: PANIC_ALL_CLEAR
                      title: ✅ All Clear
                      destructive: true
        - conditions:
            - condition: state
              entity_id: input_boolean.panic_mode
              state: 'off'
          sequence:
            - action: persistent_notification.dismiss
              data:
                notification_id: panic_mode_alert
            - delay: 00:00:01
            - action: automation.trigger
              target:
                entity_id:
                  - automation.apply_ambient_outside
- id: weather_early_sunset_lux
  alias: Dark Clouds — Trigger Early Sunset Mode
  description: Switches ambient mode to Sunset if outdoor lux drops below 100 for 10+ minutes during the day, or immediately if lux is already low when daytime starts.
  triggers:
    - trigger: template
      value_template: "{% set entities = [\n  'sensor.garden_sensor_illuminance',\n  'sensor.back_yard_sensor_illuminance',\n  'sensor.side_yard_sensor_illuminance',\n  'sensor.front_yard_sensor_illuminance'\n] %} {% set sensors = states | selectattr('entity_id', 'in', entities) | map(attribute='state') | map('float', -1) | select('>=', 0) | list %} {{ (sensors | sum / sensors | count) < 100 if sensors | count > 0 else false }}"
      for: 00:10:00
      id: lux_drop
    - trigger: state
      entity_id: input_select.ambient_light_mode
      to: 'Off'
      id: daytime_transition
  conditions:
    - condition: state
      entity_id: sun.sun
      state: above_horizon
    - condition: state
      entity_id: input_select.ambient_light_mode
      state: 'Off'
    - condition: state
      entity_id: input_select.home_mode
      state: Home
    - condition: time
      after: '08:00:00'
    - condition: state
      entity_id: binary_sensor.we_are_out_of_bed
      state: 'on'
      for: '00:10:00'
    - condition: template
      value_template: "{% set entities = [\n  'sensor.garden_sensor_illuminance',\n  'sensor.back_yard_sensor_illuminance',\n  'sensor.side_yard_sensor_illuminance',\n  'sensor.front_yard_sensor_illuminance'\n] %} {% set sensors = states | selectattr('entity_id', 'in', entities) | map(attribute='state') | map('float', -1) | select('>=', 0) | list %} {{ (sensors | sum / sensors | count) < 100 if sensors | count > 0 else false }}"
  actions:
    - action: input_select.select_option
      target:
        entity_id: input_select.ambient_light_mode
      data:
        option: Sunset
- id: weather_brightness_recovery
  alias: Bright Again — Reset Ambient to Off
  description: Reverts ambient mode to Off when outdoor lux recovers above 250 for 15+ minutes after an early sunset trigger.
  triggers:
    - trigger: template
      value_template: "{% set entities = [\n  'sensor.garden_sensor_illuminance',\n  'sensor.back_yard_sensor_illuminance',\n  'sensor.side_yard_sensor_illuminance',\n  'sensor.front_yard_sensor_illuminance'\n] %} {% set sensors = states | selectattr('entity_id', 'in', entities) | map(attribute='state') | map('float', -1) | select('>=', 0) | list %} {{ (sensors | sum / sensors | count) > 250 if sensors | count > 0 else false }}"
      for: 00:15:00
  conditions:
    - condition: state
      entity_id: sun.sun
      state: above_horizon
    - condition: state
      entity_id: input_select.ambient_light_mode
      state: Sunset
  actions:
    - action: input_select.select_option
      target:
        entity_id: input_select.ambient_light_mode
      data:
        option: 'Off'
- id: system_health_daily_report
  alias: Morning System Health Report
  description: Sends a daily summary of low-battery and offline devices to parents at 10 AM when issues are detected.
  triggers:
    - trigger: time
      at: '10:00:00'
  conditions:
    - condition: or
      conditions:
        - condition: numeric_state
          entity_id: sensor.low_battery_devices
          above: 0
        - condition: numeric_state
          entity_id: sensor.offline_devices_count
          above: 0
  actions:
    - variables:
        low_battery_list: "{% set ns = namespace(items=[]) %} {% for s in states.sensor | selectattr('attributes.device_class', 'defined') | selectattr('attributes.device_class', 'eq', 'battery') | list %}\n  {% if s.state | float(100) <= 15 %}\n    {% set ns.items = ns.items + [s.attributes.friendly_name] %}\n  {% endif %}\n{% endfor %} {{ ns.items }}"
        offline_list: "{% set domains = ['light', 'switch', 'sensor', 'binary_sensor', 'lock'] %} {{ states | selectattr('domain', 'in', domains)\n    | selectattr('state', 'in', ['unavailable', 'unknown'])\n    | map(attribute='attributes.friendly_name')\n    | list }}"
    - action: script.send_notification
      data:
        tier: 3
        targets: parent_devices
        title: "🏠 System Health Report"
        message: "{% set ns = namespace(msg=[]) %} {% if low_battery_list | count > 0 %}\n  {% set ns.msg = ns.msg + [\"Low Battery: \" ~ low_battery_list | join(', ')] %}\n{% endif %} {% if offline_list | count > 0 %}\n  {% set ns.msg = ns.msg + [\"Offline: \" ~ offline_list | join(', ')] %}\n{% endif %} {{ ns.msg | join('\\n\\n') }}"
- id: molly_room_remote_switch
  alias: "Molly's Room Remote — Switch Control"
  description: Maps ZMR4_1 top button to on, bottom to off, middle buttons to brightness up/down for Molly's room lights.
  triggers:
    - trigger: state
      entity_id: event.molly_s_room_remote_switch_action
  conditions: []
  actions:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trigger.to_state.attributes.event_type == '1_single' }}"
          sequence:
            - action: light.turn_on
              target:
                entity_id: "{{ area_entities('molly_s_room') | select('match', 'light\\.') | select('in', label_entities('bedroom')) | select('in', label_entities('inside')) | list }}"
        - conditions:
            - condition: template
              value_template: "{{ trigger.to_state.attributes.event_type == '4_single' }}"
          sequence:
            - action: light.turn_off
              target:
                entity_id: "{{ area_entities('molly_s_room') | select('match', 'light\\.') | select('in', label_entities('bedroom')) | select('in', label_entities('inside')) | list }}"
        - conditions:
            - condition: template
              value_template: "{{ trigger.to_state.attributes.event_type == '2_single' }}"
          sequence:
            - action: light.turn_on
              target:
                entity_id: "{{ area_entities('molly_s_room') | select('match', 'light\\.') | select('in', label_entities('bedroom')) | select('in', label_entities('inside')) | list }}"
              data:
                brightness_step_pct: 20
        - conditions:
            - condition: template
              value_template: "{{ trigger.to_state.attributes.event_type == '3_single' }}"
          sequence:
            - action: light.turn_on
              target:
                entity_id: "{{ area_entities('molly_s_room') | select('match', 'light\\.') | select('in', label_entities('bedroom')) | select('in', label_entities('inside')) | list }}"
              data:
                brightness_step_pct: -20
        - conditions:
            - condition: template
              value_template: "{{ trigger.to_state.attributes.event_type == '2_hold' }}"
          sequence:
            - action: light.turn_on
              target:
                entity_id: "{{ area_entities('molly_s_room') | select('match', 'light\\.') | select('in', label_entities('bedroom')) | select('in', label_entities('inside')) | list }}"
              data:
                brightness_step_pct: 40
                transition: 1
        - conditions:
            - condition: template
              value_template: "{{ trigger.to_state.attributes.event_type == '3_hold' }}"
          sequence:
            - action: light.turn_on
              target:
                entity_id: "{{ area_entities('molly_s_room') | select('match', 'light\\.') | select('in', label_entities('bedroom')) | select('in', label_entities('inside')) | list }}"
              data:
                brightness_step_pct: -40
                transition: 1
  mode: single

- id: zigbee2mqtt_resync_on_ha_start
  alias: Zigbee2MQTT — Resync on Home Assistant Start
  description: >-
    Restarts both Zigbee2MQTT instances after Home Assistant starts up to ensure
    MQTT discovery messages are re-published and all devices are properly registered.
  triggers:
    - trigger: homeassistant
      event: start
  actions:
    - delay:
        seconds: 30
    - action: mqtt.publish
      data:
        topic: zigbee2mqtt/bridge/request/restart
        payload: '{}'
    - delay:
        seconds: 5
    - action: mqtt.publish
      data:
        topic: zigbee2mqtt-02/bridge/request/restart
        payload: '{}'
  mode: single
