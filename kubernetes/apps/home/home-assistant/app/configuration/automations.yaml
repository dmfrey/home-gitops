- id: notify_people_the_girls_are_on_the_move
  alias: 'Alert: Girls Arrived or Left a Zone'
  description: Notifies parents when Camdyn or Molly arrives at or leaves any tracked zone.
  mode: queued
  max: 10
  triggers:
    - trigger: state
      entity_id:
        - person.camdyn_frey
        - person.molly_frey
  conditions:
    - condition: template
      value_template: '{{ trigger.from_state.state != trigger.to_state.state }}'
  actions:
    - action: notify.parent_devices
      data:
        title: '{{ trigger.to_state.attributes.friendly_name }} is on the Move'
        message: "{% if trigger.to_state.state == 'not_home' %}\n  {{ trigger.to_state.attributes.friendly_name }} has left {{ trigger.from_state.state }}.\n{% else %}\n  {{ trigger.to_state.attributes.friendly_name }} arrived at {{ trigger.to_state.state }}.\n{% endif %}"
        data:
          tag: location
- id: notification_tier1_thermal_failure
  alias: 'Critical Alert: Fridge or Freezer Problem'
  description: High-priority alert to parents if the refrigerator or freezer door is left open for 15 minutes or internal temperature exceeds safe limits.
  mode: restart
  triggers:
    - trigger: state
      entity_id: sensor.lm320332_door_status
      to:
        - Fridge Open
        - Freezer Open
      for: 00:15:00
      id: door_open_long
    - trigger: numeric_state
      entity_id: water_heater.lm320332_fridge
      attribute: current_temperature
      above: 45
      id: fridge_warm
    - trigger: numeric_state
      entity_id: water_heater.lm320332_freezer
      attribute: current_temperature
      above: 15
      id: freezer_warm
  actions:
    - action: persistent_notification.create
      data:
        title: "🚨 CRITICAL: Refrigerator Alert"
        message: "{% if trigger.id == 'door_open_long' %}\n  The refrigerator door has been left open for 15 minutes!\n{% else %}\n  The internal temperature is too high: {{ trigger.to_state.attributes.current_temperature }}°F\n{% endif %}"
        notification_id: fridge_thermal
    - action: notify.parent_devices
      data:
        title: "🚨 Refrigerator Alert"
        message: Check the fridge/freezer immediately! ({{ trigger.to_state.attributes.friendly_name }})
        data:
          ttl: 0
          priority: high
          channel: alarm_stream_max
          tag: fridge-failure
- id: notification_tier1_smoke_co
  alias: 'Critical Alert: Smoke or Carbon Monoxide Detected'
  description: Immediate high-priority alert to parents when any Nest Protect detects smoke or CO.
  mode: parallel
  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.office_office_protect_smoke
        - binary_sensor.office_office_protect_carbon_monoxide
        - binary_sensor.molly_s_room_nest_molly_s_room_protect_smoke
        - binary_sensor.molly_s_room_nest_molly_s_room_protect_carbon_monoxide
        - binary_sensor.hallway_nest_hallway_protect_smoke
        - binary_sensor.hallway_nest_hallway_protect_carbon_monoxide
        - binary_sensor.foyer_nest_foyer_protect_smoke
        - binary_sensor.foyer_nest_foyer_protect_carbon_monoxide
        - binary_sensor.camdyn_s_room_nest_camdyn_s_room_protect_smoke
        - binary_sensor.camdyn_s_room_nest_camdyn_s_room_protect_carbon_monoxide
        - binary_sensor.basement_nest_basement_protect_smoke
        - binary_sensor.basement_nest_basement_protect_carbon_monoxide
        - binary_sensor.barn_nest_barn_protect_smoke
        - binary_sensor.barn_nest_barn_protect_carbon_monoxide
        - binary_sensor.master_bedroom_master_bedroom_protect_smoke
        - binary_sensor.master_bedroom_master_bedroom_protect_carbon_monoxide
      to: 'on'
  actions:
    - variables:
        type: '{{ ''CO'' if ''carbon_monoxide'' in trigger.entity_id else ''Smoke'' }}'
        area: '{{ area_name(trigger.entity_id) }}'
    - action: persistent_notification.create
      data:
        title: Heads Up! {{ type }} Detected
        message: There's {{ type }} detected in the {{ area }}. Please check.
        notification_id: smoke_co_{{ trigger.entity_id.split('.')[-1] }}
    - action: notify.parent_devices
      data:
        title: Heads Up! {{ type }} Detected
        message: There's {{ type }} detected in the {{ area }}. Please check.
        data:
          ttl: 0
          priority: high
          channel: alarm_stream_max
          tag: smoke-co-emergency
- id: notification_tier1_water_leaks
  alias: 'Critical Alert: Water Leak Detected'
  description: Sends a critical alert when any water leak sensor activates, repeating every 2 minutes until the leak clears.
  mode: parallel
  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.basement_water_leak_sensor_water_leak
        - binary_sensor.kitchen_sink_water_leak_sensor_water_leak
        - binary_sensor.bathroom_sink_water_leak_sensor_water_leak
        - binary_sensor.bathroom_toilet_water_leak_sensor_water_leak
        - binary_sensor.master_bathroom_sink_water_leak_sensor_water_leak
        - binary_sensor.master_bathroom_toilet_water_leak_sensor_water_leak
        - binary_sensor.powder_room_toilet_water_leak_sensor_water_leak
        - binary_sensor.powder_room_sink_water_leak_sensor_water_leak
        - binary_sensor.laundry_room_washer_water_leak_sensor_water_leak
      to: 'on'
  actions:
    - variables:
        area: '{{ area_name(trigger.entity_id) }}'
    - repeat:
        while:
          - condition: template
            value_template: '{{ states(trigger.entity_id) == ''on'' }}'
        sequence:
          - action: script.send_notification
            data:
              title: "🚨 Water Leak: {{ area }}"
              message: A leak was detected by {{ trigger.to_state.attributes.friendly_name }}. Immediate action required!
              tier: 1
              extra_data:
                tag: water-leak
          - delay: 00:02:00
- id: notification_tier4_system_health
  alias: Critical Sensors Offline (Persistent Notification)
  description: Creates a persistent notification at 10 AM if any critical sensors (leak, smoke, window, appliance) are unavailable.
  triggers:
    - trigger: time
      at: '10:00:00'
  actions:
    - variables:
        offline_entities: '{% set critical_labels = [''leak_sensor'', ''smoke_detector'', ''window_sensor'', ''appliance''] %} {% set all_critical = critical_labels | map(''label_entities'') | sum(start=[]) %} {{ all_critical | expand | selectattr(''state'', ''in'', [''unavailable'', ''unknown'']) | map(attribute=''name'') | list }}'
    - if: '{{ offline_entities | count > 0 }}'
      then:
        - action: persistent_notification.create
          data:
            title: "🔧 System Health: Offline Sensors"
            message: 'The following critical sensors are offline: {{ offline_entities | join('', '') }}'
            notification_id: offline_sensors_check
- id: sump_pump_offline_critical
  alias: 'Critical Alert: Sump Pump Offline'
  description: High-priority alert to parents if the sump pump goes offline for more than 2 minutes, throttled to once per 30 minutes.
  mode: single
  triggers:
    - trigger: state
      entity_id:
        - switch.basement_sump_pump
      to: unavailable
      for:
        minutes: 2
  conditions:
    - condition: template
      value_template: '{% set last = this.attributes.last_triggered | default(as_datetime(0))%} {{ (now() - last).total_seconds() > (30 * 60) }}'
    - condition: state
      entity_id: binary_sensor.zigbee2mqtt_bridge_connection_state
      state: 'on'
  actions:
    - action: notify.parent_devices
      metadata: {}
      data:
        title: 'CRITICAL: Sump Pump Offline'
        message: The Sump Pump is offline. Check the GFI Outlet!
        data:
          ttl: 0
          priority: high
          channel: alarm_stream_max
          tag: sump-pump-offline
- id: notify_utility_sump_pump_running
  alias: 'Alert: Sump Pump Running'
  description: Notifies parents when the sump pump activates, throttled to once per 30 minutes.
  triggers:
    - trigger: numeric_state
      entity_id:
        - sensor.basement_sump_pump_power
      above: 2
  conditions:
    - condition: template
      value_template: '{% set last = this.attributes.last_triggered | default(as_datetime(0)) %} {{ (now() - last).total_seconds() > (30 * 60) }}'
  actions:
    - action: script.send_notification
      data:
        tier: 2
        title: Sump Pump Running
        message: The Sump Pump is running
        extra_data:
          tag: utility
    - action: input_boolean.turn_on
      metadata: {}
      data: {}
      target:
        entity_id: input_boolean.sump_pump_triggered
  mode: single
- id: notify_utility_sump_pump_stopped
  alias: 'Alert: Sump Pump Finished'
  description: Notifies parents when the sump pump stops after a triggered run.
  triggers:
    - trigger: numeric_state
      entity_id:
        - sensor.basement_sump_pump_power
      below: 1
      for:
        minutes: 1
  conditions:
    - condition: state
      entity_id: input_boolean.sump_pump_triggered
      state: 'on'
  actions:
    - action: script.send_notification
      data:
        tier: 2
        title: Sump Pump Finished
        message: The Sump Pump has finished running
        extra_data:
          tag: utility
    - action: input_boolean.turn_off
      metadata: {}
      data: {}
      target:
        entity_id: input_boolean.sump_pump_triggered
  mode: single
- id: notify_house_window_open
  alias: 'Alert: Basement Window Open When Leaving'
  description: Notifies parents when a basement window is still open as both parents leave home.
  mode: single
  triggers:
    - trigger: state
      entity_id: group.parents
      to: not_home
  conditions:
    - condition: state
      entity_id:
        - binary_sensor.basement_window_sensor_1_contact
        - binary_sensor.basement_window_sensor_2_contact
      match: any
      state: 'on'
  actions:
    - variables:
        open_windows: "{{ expand(['binary_sensor.basement_window_sensor_1_contact', 'binary_sensor.basement_window_sensor_2_contact'])\n   | selectattr('state', 'eq', 'on') | map(attribute='name') | list }}"
    - action: script.send_notification
      data:
        title: A Window is Open!
        message: '{{ open_windows | join('' and '') }} {{ ''is'' if open_windows | count == 1 else ''are'' }} open.'
        tier: 2
- id: automation_workshop_turn_lights_on_off_door_lock
  alias: Workshop Lights Follow Door Lock
  description: Turns workshop lights on when the smart lock is unlocked and off when it locks.
  triggers:
    - trigger: state
      entity_id:
        - lock.workshop_smart_lock
      to:
        - unlocked
      id: workshop_opened
    - trigger: state
      entity_id:
        - lock.workshop_smart_lock
      to:
        - locked
      id: workshop_closed
  conditions: []
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id:
                - workshop_opened
          sequence:
            - action: light.turn_on
              metadata: {}
              data:
                transition: 2
                brightness_pct: 100
              target:
                area_id: workshop
        - conditions:
            - condition: trigger
              id:
                - workshop_closed
          sequence:
            - action: light.turn_off
              metadata: {}
              data:
                transition: 2
              target:
                area_id: workshop
  mode: single
- id: motion_sensor_bathroom_ambient
  alias: Bathroom Lights — Motion Controlled
  description: Full brightness during the day; dim warm light at night. Turns off 5 minutes after clearing.
  triggers:
    - entity_id:
        - binary_sensor.bathroom_presense_sensor_presence
      to: 'on'
      id: bathroom_sensor_detected
      trigger: state
    - entity_id:
        - binary_sensor.bathroom_presense_sensor_presence
      to: 'off'
      for:
        hours: 0
        minutes: 5
        seconds: 0
      id: bathroom_sensor_area_cleared
      trigger: state
  conditions: []
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id:
                - bathroom_sensor_area_cleared
          sequence:
            - data:
                transition: 2
              action: light.turn_off
              target:
                area_id: bathroom
        - conditions:
            - condition: trigger
              id:
                - bathroom_sensor_detected
            - condition: state
              entity_id: schedule.daytime
              state: 'on'
          sequence:
            - data:
                transition: 2
                color_temp_kelvin: 2700
                brightness_pct: 100
              action: light.turn_on
              target:
                entity_id:
                  - light.bathroom_lightstrip
                  - light.bathroom_light_1
                  - light.bathroom_light_2
        - conditions:
            - condition: trigger
              id:
                - bathroom_sensor_detected
            - condition: state
              entity_id: schedule.daytime
              state: 'off'
          sequence:
            - data:
                transition: 2
                brightness_pct: 20
                color_temp_kelvin: 2237
              action: light.turn_on
              target:
                entity_id: light.bathroom_lightstrip
  mode: single
- id: bathroom_disco_shower
  alias: Disco Shower — Fun Light Effects
  description: Starts color cycling light effects in the bathroom shower when Disco Shower mode is enabled; restores normal lights when disabled.
  triggers:
    - trigger: state
      entity_id:
        - input_boolean.disco_shower
      to: 'on'
      id: disco_shower_on
    - trigger: state
      entity_id:
        - input_boolean.disco_shower
      to: 'off'
      id: disco_shower_off
  conditions: []
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id:
                - disco_shower_on
          sequence:
            - action: light.turn_on
              metadata: {}
              data:
                color_temp_kelvin: 2700
                transition: 2
                brightness_pct: 100
              target:
                area_id: bathroom
            - variables:
                disco_colors:
                  - hs_color:
                      - 330
                      - 100
                    brightness_pct: 100
                  - hs_color:
                      - 280
                      - 100
                    brightness_pct: 80
                  - hs_color:
                      - 200
                      - 100
                    brightness_pct: 100
                  - hs_color:
                      - 0
                      - 100
                    brightness_pct: 90
                  - hs_color:
                      - 185
                      - 100
                    brightness_pct: 100
                  - hs_color:
                      - 260
                      - 100
                    brightness_pct: 100
                  - hs_color:
                      - 25
                      - 100
                    brightness_pct: 80
                  - hs_color:
                      - 150
                      - 100
                    brightness_pct: 90
            - repeat:
                while: '{{ is_state(''input_boolean.disco_shower'', ''on'') }}'
                sequence:
                  - repeat:
                      for_each: '{{ disco_colors }}'
                      sequence:
                        - action: light.turn_on
                          data:
                            hs_color: '{{ repeat.item.hs_color }}'
                            brightness_pct: '{{ repeat.item.brightness_pct }}'
                            transition: 0.3
                          target:
                            entity_id:
                              - light.bathroom_lightstrip
                              - light.bathroom_shower_light
                        - delay: '00:00:00.5'
        - conditions:
            - condition: trigger
              id:
                - disco_shower_off
          sequence:
            - action: light.turn_off
              metadata: {}
              data: {}
              target:
                entity_id:
                  - light.bathroom_lightstrip
                  - light.bathroom_shower_light
            - delay:
                hours: 0
                minutes: 0
                seconds: 3
                milliseconds: 0
            - action: light.turn_on
              metadata: {}
              data:
                transition: 4
                color_temp_kelvin: 2700
                brightness_pct: 80
              target:
                area_id: bathroom
  mode: restart
- id: routine_automation_stephanie_is_away
  alias: Turn Off Flatiron Plug When Stephanie Leaves
  description: Turns off the master bathroom plug (flatiron) whenever Stephanie leaves home.
  triggers:
    - trigger: zone
