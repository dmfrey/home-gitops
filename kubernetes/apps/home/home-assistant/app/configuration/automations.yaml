      zone: zone.home
      event: leave
  conditions: []
  actions:
    - action: switch.turn_off
      metadata: {}
      data: {}
      target:
        entity_id: switch.master_bathroom_plug_2
  mode: single
- id: analyze_garden_activity
  alias: 'AI Analysis: Garden Motion Activity'
  description: Uses LLM Vision to analyze and summarize garden camera snapshots when motion is detected.
  use_blueprint:
    path: valentinfrlch/event_summary.yaml
    input:
      cooldown:
        hours: 0
        minutes: 10
        seconds: 0
      camera_entities:
        - camera.garden_garden_camera
      motion_sensors:
        - binary_sensor.garden_sensor_occupancy
      provider: 01KJQYJJE4DN0PQ7ZVBA0XAJCZ
      notify_device:
        - e5860c03f9d2bb0dfb84b3241bb7e4cf
      important: true
      notification_time: at {{ now().strftime("%-I:%M %p") }}
      model: gemini-2.5-flash
      file_path: /config/www/llmvision/snapshots_blueprint/{{ camera_file_path }}/{{ now().strftime('%Y%m%d_%H%M%S') }}.jpg
      tap_navigate: /dashboard-cameras/garden
      trigger_state: streaming
      use_memory: true
      duration: 10
      max_frames: 8
      message: 'Describe any movement in this home security camera footage. Identify people (note if they are a recognized family member or an unknown person), animals, or vehicles. Include direction of movement and any notable behavior. Be concise - 2 sentences maximum. If nothing significant is present, respond with ''No significant activity.'''
