- alias: Kitchen Adaptive Lighting — Manual Override Pause
  id: adaptive_lighting_manual_override_manager
  description: Pauses kitchen adaptive lighting for 1 hour when brightness is changed manually by more than 5%.
  mode: restart
  triggers:
    - trigger: state
      entity_id: light.auto_bright_lights
  conditions:
    - condition: template
      value_template: '{{ trigger.to_state.context.user_id is not none or trigger.to_state.context.parent_id is none }}'
    - condition: template
      value_template: '{{ trigger.from_state.state not in [''unknown'', ''unavailable''] }}'
    - condition: template
      value_template: '{{ (as_timestamp(now()) - as_timestamp(states(''sensor.uptime''))) > 60 }}'
    - condition: template
      value_template: '{% set old_b = trigger.from_state.attributes.brightness | int(0) %} {% set new_b = trigger.to_state.attributes.brightness | int(0) %} {{ (old_b - new_b) | abs > 13 }}'
  actions:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.adaptive_lighting_override
    - delay:
        hours: 1
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.adaptive_lighting_override
- alias: Kitchen Lights On — Occupancy Triggered
  id: kitchen_turn_on_with_occupancy
  description: Turns on kitchen lux-adaptive lights when the kitchen sensor detects occupancy during daytime.
  triggers:
    - trigger: state
      entity_id: binary_sensor.kitchen_sensor_occupancy
      to: 'on'
  conditions:
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.home_mode
          state:
            - Home
            - Night
        - condition: and
          conditions:
            - condition: state
              entity_id: input_select.home_mode
              state: Vacation
            - condition: state
              entity_id: input_boolean.house_sitter
              state: 'on'
    - condition: template
      value_template: '{{ expand(label_entities(''auto_bright'')) | selectattr(''domain'',''eq'',''light'') | selectattr(''state'',''eq'',''on'') | list | count == 0 }}'
    - condition: state
      entity_id: sun.sun
      state: above_horizon
    - condition: template
      value_template: '{{ (state_attr(''sun.sun'', ''next_setting'') | as_timestamp - now() | as_timestamp) / 60 > 45 }}'
  actions:
    - action: light.turn_on
      target:
        label_id: auto_bright
      data:
        brightness_pct: '{{ states(''sensor.kitchen_auto_bright_level'') | int }}'
        color_temp_kelvin: '{{ states(''sensor.kitchen_auto_color_temp'') | int }}'
- alias: Kitchen Lights — Adjust to Lux Level
  id: kitchen_adjust_adaptive_lighting
  description: Continuously adjusts kitchen brightness and color temperature based on outdoor light levels while lights are on.
  triggers:
    - trigger: state
      entity_id: sensor.kitchen_sensor_illuminance
  conditions:
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.home_mode
          state:
            - Home
            - Night
        - condition: and
          conditions:
            - condition: state
              entity_id: input_select.home_mode
              state: Vacation
            - condition: state
              entity_id: input_boolean.house_sitter
              state: 'on'
    - condition: state
      entity_id: input_boolean.adaptive_lighting_override
      state: 'off'
    - condition: template
      value_template: '{{ expand(label_entities(''auto_bright'')) | selectattr(''domain'',''eq'',''light'') | selectattr(''state'',''eq'',''on'') | list | count > 0 }}'
    - condition: state
      entity_id: sun.sun
      state: above_horizon
    - condition: template
      value_template: '{{ (state_attr(''sun.sun'', ''next_setting'') | as_timestamp - now() | as_timestamp) / 60 > 45 }}'
  actions:
    - action: light.turn_on
      target:
        label_id: auto_bright
      data:
        brightness_pct: '{{ states(''sensor.kitchen_auto_bright_level'') | int }}'
        color_temp_kelvin: '{{ states(''sensor.kitchen_auto_color_temp'') | int }}'
- id: apply_game_time
  alias: Game Time — Start Dynamic Light Scene
  description: Activates team-colored dynamic lighting for the active sports team (Eagles, Flyers, Phillies, Penn State) when game time is on.
  mode: restart
  triggers:
    - trigger: state
      entity_id:
        - input_boolean.game_time_eagles
        - input_boolean.game_time_flyers
        - input_boolean.game_time_penn_st
        - input_boolean.game_time_phillies
      to: 'on'
    - trigger: state
      entity_id: input_select.ambient_light_mode
  conditions:
    - condition: state
      entity_id: input_boolean.game_time
      state: 'on'
  actions:
    - variables:
        team_slug: '{% set id = trigger.entity_id | default("") %}{%- if ''phillies'' in id %}phillies{%- elif ''eagles'' in id %}eagles{%- elif ''flyers'' in id %}flyers{%- elif ''penn_st'' in id %}penn_st{%- elif is_state(''input_boolean.game_time_phillies'', ''on'') %}phillies{%- elif is_state(''input_boolean.game_time_eagles'', ''on'') %}eagles{%- elif is_state(''input_boolean.game_time_flyers'', ''on'') %}flyers{%- elif is_state(''input_boolean.game_time_penn_st'', ''on'') %}penn_st{%- else %}unknown{%- endif %}'
        preset_id_map:
          eagles: 36246dc7-718b-44c5-a131-ece43202e25a
          flyers: b7873f7c-fad4-486d-8770-c95f7117f489
          penn_st: 3e158682-cafe-47d8-8702-edc117c1fd2d
          phillies: 9fbce023-52f2-447c-953f-c72d5a173d8c
        selected_preset_id: '{{ preset_id_map[team_slug] | default(none) }}'
    - if: '{{ selected_preset_id is not none }}'
      then:
        - action: scene_presets.start_dynamic_scene
          data:
            preset_id: '{{ selected_preset_id }}'
            targets:
              label_id: game_time
            transition: 45
            interval: 60
            brightness: 255
- id: ambient_light_mode_manager
  alias: Ambient Mode — Schedule Manager
  description: Transitions ambient light mode through Morning, Off (daytime), Sunset, Relax, and Off (night) based on time and sun events.
  mode: restart
  triggers:
    - trigger: time
      at: 00:00:00
      id: 'off'
    - trigger: time
      at: 05:31:00
      id: morning
    - trigger: sun
      event: sunrise
      offset: 00:20:00
      id: daytime
    - trigger: sun
      event: sunset
      offset: -00:45:00
      id: sunset
    - trigger: time
      at: '20:15:00'
      id: relax
    - trigger: state
      entity_id: input_select.home_mode
  actions:
    - choose:
        - conditions: '{{ is_state(''input_select.home_mode'', ''Night'') }}'
          sequence:
            - action: input_select.select_option
              target:
                entity_id: input_select.ambient_light_mode
              data:
                option: 'Off'
        - conditions:
            - condition: time
              after: 05:30:00
            - condition: sun
              before: sunrise
              before_offset: 00:20:00
          sequence:
            - action: input_select.select_option
              target:
                entity_id: input_select.ambient_light_mode
              data:
                option: Morning
        - conditions:
            - condition: sun
              after: sunset
              after_offset: -00:45:00
            - condition: time
              before: '20:15:00'
          sequence:
            - action: input_select.select_option
              target:
                entity_id: input_select.ambient_light_mode
              data:
                option: Sunset
        - conditions:
            - condition: time
              after: '20:15:00'
            - condition: time
              before: '23:59:59'
          sequence:
            - action: input_select.select_option
              target:
                entity_id: input_select.ambient_light_mode
              data:
                option: Relax
      default:
        - action: input_select.select_option
          target:
            entity_id: input_select.ambient_light_mode
          data:
            option: 'Off'
- id: apply_ambient_inside
  alias: Inside Ambient Lights — Apply Mode
  description: Applies the current ambient mode to interior lights. Morning limits to first floor only; Off turns everything off; Sunset and Relax apply warm settings to all rooms.
  mode: restart
  triggers:
    - trigger: state
      entity_id: input_select.ambient_light_mode
  conditions:
    - condition: state
      entity_id: input_boolean.panic_mode
      state: 'off'
  actions:
    - variables:
        curr_ambient_state: '{{ states(''input_select.ambient_light_mode'') }}'
        mode_properties:
          Morning:
            transition: 5
            brightness_pct: 60
            color_temp_kelvin: 2237
          Sunset:
            transition: 5
            brightness_pct: 100
            color_temp_kelvin: 2700
          Relax:
            transition: 5
            brightness_pct: 60
            color_temp_kelvin: 2237
        props: '{{ mode_properties[curr_ambient_state] if curr_ambient_state in mode_properties else none }}'
        all_inside_lights: "{% set lights = label_entities('ambient') | select('in', label_entities('inside')) | reject('in', label_entities('bedroom')) | list %} {% if is_state('input_boolean.holiday_time', 'on') %}\n  {% set lights = lights | reject('in', label_entities('holiday')) | list %}\n{% endif %} {{ lights }}"
        morning_lights: '{% set first_floor = floor_areas(''first_floor'') | map(''area_entities'') | sum(start=[]) | list -%} {{ all_inside_lights | select(''in'', first_floor) | list }}'
        second_floor_lights: '{{ all_inside_lights | reject(''in'', morning_lights) | list }}'
    - choose:
        - conditions: '{{ curr_ambient_state == ''Off'' }}'
          sequence:
            - action: light.turn_off
              target:
                entity_id: '{{ all_inside_lights }}'
        - conditions: '{{ curr_ambient_state == ''Morning'' }}'
          sequence:
            - action: light.turn_on
              target:
                entity_id: '{{ morning_lights }}'
              data:
                transition: '{{ props.transition }}'
                brightness_pct: '{{ props.brightness_pct }}'
                color_temp_kelvin: '{{ props.color_temp_kelvin }}'
            - action: light.turn_off
              target:
                entity_id: '{{ second_floor_lights }}'
        - conditions: '{{ props is not none }}'
          sequence:
            - action: light.turn_on
              target:
                entity_id: '{{ all_inside_lights }}'
              data:
                transition: '{{ props.transition }}'
                brightness_pct: '{{ props.brightness_pct }}'
                color_temp_kelvin: '{{ props.color_temp_kelvin }}'
- id: apply_ambient_outside
  alias: Outside Ambient Lights — Apply Mode
  description: Applies the current ambient mode to exterior lights, excluding game time, holiday, and security-only lights as needed.
  mode: restart
  triggers:
    - trigger: state
      entity_id: input_select.ambient_light_mode
    - trigger: state
      entity_id: input_select.home_mode
  conditions:
    - condition: state
      entity_id: input_boolean.panic_mode
      state: 'off'
  actions:
    - variables:
        curr_ambient_mode: '{{ states(''input_select.ambient_light_mode'') }}'
        mode_properties:
          Morning:
            transition: 5
            brightness_pct: 60
            color_temp_kelvin: 2237
          Sunset:
            transition: 5
            brightness_pct: 100
            color_temp_kelvin: 2700
          Relax:
            transition: 5
            brightness_pct: 60
            color_temp_kelvin: 2237
        props: '{{ mode_properties[curr_ambient_mode] if curr_ambient_mode in mode_properties else none }}'
        target_lights: "{% set lights = label_entities('ambient') | select('in', label_entities('outside')) | list %} {% set exclude = [] %} {% if is_state('input_select.home_mode', 'Night') %}\n  {% set exclude = exclude + (label_entities('security_ambient') | select('in', lights) | list) %}\n{% endif %} {% if is_state('input_boolean.game_time', 'on') %}\n  {% set exclude = exclude + label_entities('game_time') %}\n{% elif is_state('input_boolean.holiday_time', 'on') %}\n  {% set exclude = exclude + label_entities('holiday') %}\n{% endif %} {{ lights | reject('in', exclude) | list }}"
    - choose:
        - conditions: '{{ props is none }}'
          sequence:
            - action: light.turn_off
              target:
                entity_id: '{{ target_lights }}'
        - conditions: '{{ props is not none }}'
          sequence:
            - action: light.turn_on
              target:
                entity_id: '{{ target_lights }}'
              data:
                transition: '{{ props.transition }}'
                brightness_pct: '{{ props.brightness_pct }}'
                color_temp_kelvin: '{{ props.color_temp_kelvin }}'
            - delay: '00:00:05'
            - action: light.turn_on
              target:
                entity_id: '{{ target_lights }}'
              data:
                transition: '{{ props.transition }}'
                brightness_pct: '{{ props.brightness_pct }}'
                color_temp_kelvin: '{{ props.color_temp_kelvin }}'
- id: security_ambient_lighting_manager
  alias: Security Ambient Lights — Night Watch
  description: Keeps security-labeled outdoor lights on at 40% during Night mode when ambient is Off; turns them off otherwise.
  mode: restart
  triggers:
    - trigger: state
      entity_id: input_select.home_mode
    - trigger: state
      entity_id: input_select.ambient_light_mode
  actions:
    - variables:
        is_night: '{{ is_state(''input_select.home_mode'', ''Night'') }}'
        is_ambient_off: '{{ is_state(''input_select.ambient_light_mode'', ''Off'') }}'
        target_lights: '{{ label_entities(''security_ambient'') }}'
    - choose:
        - conditions: '{{ is_night and is_ambient_off }}'
          sequence:
            - action: light.turn_on
              target:
                entity_id: '{{ target_lights }}'
              data:
                brightness_pct: 40
                color_temp_kelvin: 2237
                transition: 5
        - conditions: '{{ is_night and not is_ambient_off }}'
          sequence: []
        - conditions: '{{ not is_night and is_ambient_off }}'
          sequence:
            - action: light.turn_off
              target:
                entity_id: '{{ target_lights }}'
