---
- id: notification_tier3_oven_status
  alias: 'Alert: Oven Preheated or Cooking Done'
  description: Notifies when the oven finishes preheating or a cooking cycle ends.
  mode: parallel
  triggers:
    - trigger: state
      entity_id: sensor.srav935451p_current_state
      from: Preheating
      id: preheat_complete
    - trigger: state
      entity_id: sensor.srav935451p_current_state
      to: 'Off'
      from:
        - Baking
        - Convection Bake
        - Broiling
        - Timed Cook
      id: cooking_complete
  actions:
    - action: script.send_notification
      data:
        title: Oven Update
        message: "{% if trigger.id == 'preheat_complete' %}\n  The oven has finished preheating to {{ states('sensor.srav935451p_display_temperature') }}°F.\n{% else %}\n  The oven has finished its cooking cycle.\n{% endif %}"
        tier: 3
- id: notification_tier3_appliances_finished
  alias: 'Alert: Laundry or Dishwasher Cycle Done'
  description: Notifies anyone home when the washer, dryer, or dishwasher finishes a cycle.
  mode: parallel
  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.d828c9343e5b_dishwasher_is_clean
        - binary_sensor.rm833274c_laundry_end_of_cycle
        - binary_sensor.rm171996g_laundry_end_of_cycle
      to: 'on'
      for: 00:01:00
  actions:
    - variables:
        mapping:
          d828c9343e5b_dishwasher_is_clean: Dishwasher
          rm833274c_laundry_end_of_cycle: Dryer
          rm171996g_laundry_end_of_cycle: Washer
        device: '{{ mapping[trigger.entity_id.split(''.'')[-1]] | default(''Appliance'') }}'
    - action: script.send_notification
      data:
        title: '{{ device }} Complete'
        message: The {{ device }} cycle has finished.
        tier: 3
- id: notification_tier2_security_sweep
  alias: 'Alert: Windows Open or Appliances On When Leaving'
  description: Warns parents when transitioning to Night or Away with windows still open or the oven or cooktop still on.
  mode: restart
  triggers:
    - trigger: state
      entity_id: input_select.home_mode
      to:
        - Night
        - Away
  actions:
    - variables:
        open_windows: '{{ label_entities(''window_sensor'') | expand | selectattr(''state'', ''eq'', ''on'') | map(attribute=''name'') | list }}'
        oven_on: '{{ not is_state(''sensor.srav935451p_current_state'', ''Off'') }}'
        cooktop_on: '{{ is_state(''binary_sensor.srav935451p_cooktop_status'', ''on'') }}'
    - if: '{{ open_windows | count > 0 or oven_on or cooktop_on }}'
      then:
        - action: script.send_notification
          data:
            title: '⚠️ Security Warning: House Shutdown'
            message: '{% set ns = namespace(msgs=[]) %} {% if open_windows | count > 0 %}{% set ns.msgs = ns.msgs + ["Open windows: " ~ open_windows | join('', '')] %}{% endif %} {% if oven_on %}{% set ns.msgs = ns.msgs + ["The Oven is still ON"] %}{% endif %} {% if cooktop_on %}{% set ns.msgs = ns.msgs + ["The Cooktop is still ON"] %}{% endif %} {{ ns.msgs | join(''\n'') }}'
            tier: 2
- id: routine_basement_workout_start
  alias: Turn On Lights for Morning Workout
  description: Turns on basement lights in Morning ambient settings when ambient mode goes to Morning and Daniel is home.
  triggers:
    - trigger: state
      entity_id: input_select.ambient_light_mode
      to: Morning
  conditions:
    - condition: zone
      entity_id: person.daniel_frey
      zone: zone.home
  actions:
    - target:
        area_id: basement
      data:
        transition: 5
        brightness_pct: 100
        color_temp_kelvin: 2237
      action: light.turn_on
  mode: single
- id: routine_basement_workout_complete
  alias: Turn Off Lights After Morning Workout
  description: Turns off basement lights at 8:30 AM when Daniel is home.
  triggers:
    - at: 08:30:00
      trigger: time
  conditions:
    - condition: zone
      entity_id: person.daniel_frey
      zone: zone.home
  actions:
    - target:
        area_id: basement
      data: {}
      action: light.turn_off
  mode: single
- id: switch_lights_basement
  alias: Basement Light Switch — Toggle or Dim
  description: Single press toggles basement lights at full brightness; double press dims them for a relaxed scene.
  mode: single
  triggers:
    - trigger: device
      domain: mqtt
      device_id: 3a88666b670f8e46cdaef002f4d63c2d
      type: action
      subtype: single
      id: basement_switch_single
    - trigger: device
      domain: mqtt
      device_id: 3a88666b670f8e46cdaef002f4d63c2d
      type: action
      subtype: double
      id: basement_switch_double
  conditions: []
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id:
                - basement_switch_single
          sequence:
            - action: light.toggle
              target:
                area_id: basement
              data:
                transition: 2
                color_temp_kelvin: 2700
                brightness_pct: 100
        - conditions:
            - condition: trigger
              id:
                - basement_switch_double
          sequence:
            - action: light.turn_on
              target:
                area_id: basement
              data:
                transition: 2
                color_temp_kelvin: 2237
                brightness_pct: 60
- id: routine_bathroom_wake_up
  alias: Wake Up Bathroom Lights on School Days
  description: Gently fades bathroom lights on when Morning ambient mode starts on school days, skipping holidays and snow days. Only runs when Molly is home. Temporary — remove after June graduation.
  mode: single
  triggers:
    - trigger: state
      entity_id: input_select.ambient_light_mode
      to: Morning
  conditions:
    - condition: state
      entity_id: binary_sensor.school_day
      state: 'on'
    - condition: not
      conditions:
        - condition: or
          conditions:
            - condition: state
              entity_id: binary_sensor.holiday
              state: 'on'
            - condition: state
              entity_id: binary_sensor.snow_day
              state: 'on'
  actions:
    - action: light.turn_on
      data:
        transition: 300
        color_temp_kelvin: 2700
        brightness_pct: 30
      target:
        area_id:
          - bathroom
- id: cube_office_dan_office_cube
  alias: Dan's Office Cube — Toggle Lights
  description: Toggles office lights on any side flip of Dan's Zigbee cube.
  trigger_variables:
    action_flip90: flip90
    action_rotate_right: rotate_right
    action_rotate_left: rotate_left
    action_shake: shake
    action_slide: slide
    action_tap: tap
    action_throw: throw
  triggers:
    - trigger: mqtt
      topic: zigbee2mqtt/Dan's Office Cube
      payload: '{{ action_slide }}'
      value_template: '{{ value_json.action }}'
      id: slide
    - trigger: mqtt
      topic: zigbee2mqtt/Dan's Office Cube
      payload: '{{ action_tap }}'
      value_template: '{{ value_json.action }}'
      id: tap
    - trigger: mqtt
      topic: zigbee2mqtt/Dan's Office Cube
      payload: '{{ action_rotate_right }}'
      value_template: '{{ value_json.action }}'
      id: rotate_right
    - trigger: mqtt
      topic: zigbee2mqtt/Dan's Office Cube
      payload: '{{ action_rotate_left }}'
      value_template: '{{ value_json.action }}'
      id: rotate_left
    - trigger: mqtt
      topic: zigbee2mqtt/Dan's Office Cube
      payload: '{{ action_shake }}'
      value_template: '{{ value_json.action }}'
      id: shake
    - trigger: mqtt
      topic: zigbee2mqtt/Dan's Office Cube
      payload: '{{ action_throw }}'
      value_template: '{{ value_json.action }}'
      id: throw
    - trigger: mqtt
      topic: zigbee2mqtt/Dan's Office Cube
      payload: '{{ action_flip90 }}'
      value_template: '{{ value_json.action }}'
      id: flip90
  actions:
    - choose:
        - conditions:
            - condition: state
              entity_id: sensor.dan_s_office_cube_side
              state: '1'
            - condition: trigger
              id: flip90
          sequence:
            - action: light.toggle
              target:
                area_id: office
              data: {}
        - conditions:
            - condition: state
              entity_id: sensor.dan_s_office_cube_side
              state: '2'
            - condition: trigger
              id: flip90
          sequence:
            - action: light.toggle
              target:
                area_id: office
              data: {}
        - conditions:
            - condition: state
              entity_id: sensor.dan_s_office_cube_side
              state: '3'
            - condition: trigger
              id: flip90
          sequence:
            - action: light.toggle
              target:
                area_id: office
              data: {}
        - conditions:
            - condition: state
              entity_id: sensor.dan_s_office_cube_side
              state: '4'
            - condition: trigger
              id: flip90
          sequence:
            - action: light.toggle
              target:
                area_id: office
              data: {}
        - conditions:
            - condition: state
              entity_id: sensor.dan_s_office_cube_side
              state: '5'
            - condition: trigger
              id: flip90
          sequence:
            - action: light.toggle
              target:
                area_id: office
              data: {}
        - conditions:
            - condition: state
              entity_id: sensor.dan_s_office_cube_side
              state: '6'
            - condition: trigger
              id: flip90
          sequence:
            - action: light.toggle
              target:
                area_id: office
              data: {}
- id: notify_family_room_time_to_water_sully
  alias: 'Alert: Sully Needs Watering'
  description: Notifies when Sully's soil moisture drops below 4%.
  triggers:
    - trigger: numeric_state
      entity_id: plant.sully
      attribute: moisture
      below: 4
  conditions: []
  actions:
    - action: script.send_notification
      data:
        title: Sully needs water
        message: The moisture level in Sully's pot has gone below 4%. It's time to water.
        tier: 3
        extra_data:
          tag: plants
  mode: single
- id: routine_house_goodnight
  alias: House Night Shutdown — Lights & Switches Off
  description: Turns off all non-essential lights and switches throughout the house when Home Mode transitions to Night.
  triggers:
    - trigger: state
      entity_id: input_select.home_mode
      to: Night
  conditions: []
  actions:
    - target:
        area_id:
          - basement
          - bathroom
          - camdyn_s_room
          - den
          - dining_room
          - family_room
          - foyer
          - garden
          - hallway
          - living_room
          - kitchen
          - master_closet
          - office
          - side_yard
          - workshop
        entity_id:
          - light.molly_s_room_desk_light_1
          - light.molly_s_room_light_1
          - light.light.molly_s_room_nightstand_light
          - light.molly_s_room_fan_lights
      data: {}
      action: light.turn_off
    - target:
        area_id:
          - bathroom
          - camdyn_s_room
          - front_yard
          - hallway
          - living_room
          - master_bathroom
          - molly_s_room
          - workshop
      data: {}
      action: switch.turn_off
  mode: single
- id: notify_mail_box_mailbox_opened
  alias: 'Alert: Mail Has Arrived'
  description: Notifies when the mailbox sensor detects the door has been opened, with a quick-reply action to confirm it was checked.
  mode: single
  triggers:
    - trigger: state
      entity_id: input_boolean.mailbox_guard_motion
      to: 'on'
  conditions: []
  actions:
    - action: script.send_notification
      data:
        tier: 3
        title: Mailbox Opened!
        message: The mailbox was opened.
        extra_data:
          url: /lovelace/home
          tag: mailbox
          image: /media/local/notify/mailbox.jpg
          actions:
            - action: received
              title: I checked the mailbox
    - action: input_number.set_value
      data:
        entity_id: input_number.mailbox_guard_count
        value: '{{ (states.input_number.mailbox_guard_count.state | int) + 1 }}'
    - action: input_boolean.turn_off
      data:
        entity_id: input_boolean.mailbox_guard_motion
- id: notify_mail_box_low_battery
  alias: 'Alert: Mailbox Sensor Battery Low'
  description: Notifies when the mailbox guard reports a low battery condition.
  mode: single
  triggers:
    - trigger: state
      entity_id: input_boolean.mailbox_guard_low_battery
      to: 'on'
  conditions: []
  actions:
    - action: script.send_notification
      data:
        tier: 3
        title: Maintenance Warning
        message: Mailbox Guard Low Battery!
    - action: input_boolean.turn_off
      data:
        entity_id: input_boolean.mailbox_guard_low_battery
- id: motion_sensor_master_bathroom_ambient
  alias: Master Bathroom Lights — Motion Controlled
  description: Full brightness during the day; dim warm light at night. Turns off 3 minutes after clearing.
  mode: single
  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.master_bathroom_sensor_occupancy_2
      to: 'on'
      id: master_bathroom_sensor_detected
    - trigger: state
      entity_id:
        - binary_sensor.master_bathroom_sensor_occupancy_2
      to: 'off'
      for:
        hours: 0
        minutes: 3
        seconds: 0
      id: master_bathroom_sensor_area_cleared
  conditions: []
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id:
                - master_bathroom_sensor_area_cleared
          sequence:
            - action: light.turn_off
              target:
                entity_id: light.master_bathroom_lightstrip
              data:
                transition: 2
        - conditions:
            - condition: trigger
              id:
                - master_bathroom_sensor_detected
            - condition: state
              entity_id: schedule.daytime
              state: 'on'
          sequence:
            - action: light.turn_on
              target:
                area_id: master_bathroom
              data:
                transition: 2
                color_temp_kelvin: 2700
                brightness_pct: 100
        - conditions:
            - condition: trigger
              id:
                - master_bathroom_sensor_detected
            - condition: state
              entity_id: schedule.daytime
              state: 'off'
          sequence:
            - action: light.turn_on
              target:
                entity_id: light.master_bathroom_lightstrip
              data:
                transition: 2
                brightness_pct: 20
                color_temp_kelvin: 2237
- id: routine_master_bedroom_wake_up
  alias: Turn Off Bedroom Devices After Getting Up
  description: Turns off diffuser and fan when all home parents have been out of bed for 3+ minutes during Home mode.
  mode: single
  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.we_are_out_of_bed
      to: 'on'
      for:
        hours: 0
        minutes: 3
        seconds: 0
  conditions:
    - condition: state
      entity_id: input_select.home_mode
      state: Home
  actions:
    - action: humidifier.turn_off
      target:
        entity_id: humidifier.master_bedroom_diffuser
      data: {}
    - action: fan.turn_off
      target:
        entity_id: fan.master_bedroom_tower_fan
      data: {}
- id: routine_master_bedroom_goodnight
  alias: Good Night — Bedroom Lights Off, Fan On
  description: Turns off master bedroom lights and starts the tower fan at 33% when Good Night is triggered.
  triggers:
    - entity_id:
        - input_boolean.good_night
      to: 'on'
      trigger: state
  conditions: []
  actions:
    - target:
        area_id:
          - master_bedroom
      action: light.turn_off
    - condition: or
      conditions:
        - condition: state
          entity_id: person.daniel_frey
          state: home
        - condition: state
          entity_id: person.stephanie_frey
          state: home
    - data:
        percentage: 33
      target:
        entity_id: fan.master_bedroom_tower_fan
      metadata: {}
      action: fan.turn_on
  mode: single
- id: routine_master_bedroom_goodnight_dan_home
  alias: Good Night — Start Diffuser (Dan Home)
  description: Activates the bedroom diffuser scene when Good Night is triggered and Daniel is home.
  triggers:
    - entity_id:
        - input_boolean.good_night
      to: 'on'
      trigger: state
  conditions:
    - condition: state
      entity_id: person.daniel_frey
      state: home
  actions:
    - target:
        entity_id: scene.turn_on_diffuser
      metadata: {}
      action: scene.turn_on
      data: {}
  mode: single
- id: automation_master_bedroom_entertainment_lights
  alias: Bedroom Surround Lights — Switch Control
  description: Double-tap up turns on surround lights at 75%; single tap down turns them off.
  mode: single
  triggers:
    - domain: mqtt
      device_id: a2ac8391f7b7364918d3155b0d74381e
      type: action
      subtype: up_double
      trigger: device
      id: up_double
    - domain: mqtt
      device_id: a2ac8391f7b7364918d3155b0d74381e
      type: action
      subtype: down_single
      trigger: device
      id: down_single
  conditions: []
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id:
                - up_double
          sequence:
            - action: light.turn_on
              metadata: {}
              data:
                transition: 4
                color_temp_kelvin: 2700
                brightness_pct: 75
              target:
                entity_id:
                  - light.master_bedroom_surround_light_1
                  - light.master_bedroom_surround_light_2
        - conditions:
            - condition: trigger
              id:
                - down_single
          sequence:
            - action: light.turn_off
              metadata: {}
              data:
                transition: 2
              target:
                entity_id:
                  - light.master_bedroom_surround_light_1
                  - light.master_bedroom_surround_light_2
- id: motion_sensor_master_closet_automation
  alias: Master Closet Lights — Motion Controlled
  description: Turns closet lights on when motion is detected; turns off 3 minutes after clearing. Respects manual override.
  triggers:
    - entity_id:
        - binary_sensor.master_closet_matter_sensor_occupancy
      to:
        - 'on'
      id: master_closet_sensor_motion_detected
      trigger: state
    - entity_id:
        - binary_sensor.master_closet_matter_sensor_occupancy
      to:
        - 'off'
      id: master_closet_sensor_area_cleared
      for:
        hours: 0
        minutes: 3
        seconds: 0
      trigger: state
  conditions:
    - condition: state
      entity_id: input_boolean.master_closet_sensor_override
      state:
        - 'off'
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id:
                - master_closet_sensor_motion_detected
          sequence:
            - metadata: {}
              data:
                transition: 2
                color_temp_kelvin: 2700
                brightness_pct: 100
              target:
                area_id: master_closet
              action: light.turn_on
        - conditions:
            - condition: trigger
              id:
                - master_closet_sensor_area_cleared
          sequence:
            - metadata: {}
              data:
                transition: 2
              target:
                area_id: master_closet
              action: light.turn_off
  mode: single
- id: routine_molly_room_wake_up
  alias: Wake Up Molly's Lights on School Days
  description: Gradually turns on Molly's room lights at 5:25 AM on school days, skipping holidays and snow days.
  mode: queued
  max: 10
  triggers:
    - trigger: time
      at: 05:25:00
  conditions:
    - condition: zone
      entity_id: person.molly_frey
      zone: zone.home
    - condition: state
      entity_id: binary_sensor.school_day
      state: 'on'
    - condition: not
      conditions:
        - condition: or
          conditions:
            - condition: state
              entity_id: binary_sensor.holiday
              state: 'on'
            - condition: state
              entity_id: binary_sensor.snow_day
              state: 'on'
  actions:
    - action: light.turn_on
      target:
        area_id: molly_s_room
      data:
        transition: 300
        color_temp_kelvin: 2700
        brightness_pct: 100
- id: routine_office_workday
  alias: Work Day — Lights On & TTS Reminders
  description: Turns on office lights at workday start and announces reminders throughout the day via TTS.
  triggers:
    - at: 08:10:00
      id: workday_start
      trigger: time
    - at: '10:00:00'
      id: workday_mid_morning
      trigger: time
    - at: '13:00:00'
      id: workday_lunch
      trigger: time
    - at: '14:00:00'
      id: workday_after_lunch
      trigger: time
    - at: '15:30:00'
      id: workday_mid_afternoon
      trigger: time
    - at: '16:45:00'
      id: workday_evening
      trigger: time
  conditions:
    - condition: zone
      entity_id: person.daniel_frey
      zone: zone.home
    - condition: state
      entity_id: binary_sensor.work_day
      state: 'on'
    - condition: not
      conditions:
        - condition: or
          conditions:
            - condition: state
              entity_id: binary_sensor.work_holiday
              state: 'on'
            - condition: state
              entity_id: binary_sensor.work_travel
              state: 'on'
  actions:
    - action: media_player.volume_set
      metadata: {}
      target:
        entity_id: media_player.pixel_tablet_2
      data:
        volume_level: 0.3
    - delay:
        milliseconds: 500
    - choose:
        - conditions:
            - condition: trigger
              id:
                - workday_start
          sequence:
            - metadata: {}
              data:
                transition: 1
                color_temp_kelvin: 2700
                brightness_pct: 100
              target:
                area_id: office
              action: light.turn_on
            - condition: state
              entity_id: binary_sensor.office_sensor_occupancy
              state: 'on'
            - metadata: {}
              data:
                cache: true
                media_player_entity_id: media_player.pixel_tablet_2
                message: It's time to start your work day. Have a great day!
              target:
                entity_id:
                  - tts.piper
              action: tts.speak
        - conditions:
            - condition: trigger
              id:
                - workday_mid_morning
          sequence:
            - condition: state
              entity_id: binary_sensor.office_sensor_occupancy
              state: 'on'
            - metadata: {}
              data:
                cache: true
                media_player_entity_id: media_player.pixel_tablet_2
                message: It's time to stand up and stretch. Let's take a break for 10 minutes.
              target:
                entity_id:
                  - tts.piper
              action: tts.speak
        - conditions:
            - condition: trigger
              id:
                - workday_lunch
          sequence:
            - condition: state
              entity_id: binary_sensor.office_sensor_occupancy
              state: 'on'
            - metadata: {}
              data:
                cache: true
                media_player_entity_id: media_player.pixel_tablet_2
                message: It's time for lunch! Remember to wash your hands!
              target:
                entity_id:
                  - tts.piper
              action: tts.speak
        - conditions:
            - condition: trigger
              id:
                - workday_after_lunch
          sequence:
            - condition: state
              entity_id: binary_sensor.office_sensor_occupancy
              state: 'on'
            - metadata: {}
              data:
                cache: true
                media_player_entity_id: media_player.pixel_tablet_2
                message: Hope you're having a good day! Want to go for a walk?
              target:
                entity_id:
                  - tts.piper
              action: tts.speak
        - conditions:
            - condition: trigger
              id:
                - workday_mid_afternoon
          sequence:
            - condition: state
              entity_id: binary_sensor.office_sensor_occupancy
              state: 'on'
            - metadata: {}
              data:
                cache: true
                media_player_entity_id: media_player.pixel_tablet_2
                message: Let's go grab a glass of water. And why don't you go wash your hands?
              target:
                entity_id:
                  - tts.piper
              action: tts.speak
        - conditions:
            - condition: trigger
              id:
                - workday_evening
          sequence:
            - condition: state
              entity_id: binary_sensor.office_sensor_occupancy
              state: 'on'
            - metadata: {}
              data:
                cache: true
                media_player_entity_id: media_player.pixel_tablet_2
                message: Time to start wrapping up your work day and plan for dinner!
              target:
                entity_id:
                  - tts.piper
              action: tts.speak
  mode: single
- id: routine_office_close_the_office
  alias: Turn Off Office Lights at End of Day
  description: Turns off office lights at 6 PM daily.
  mode: single
  triggers:
    - trigger: time
