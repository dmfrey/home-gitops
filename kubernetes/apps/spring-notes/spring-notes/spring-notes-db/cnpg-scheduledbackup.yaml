---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/postgresql.cnpg.io/scheduledbackup_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: spring-notes-cnpg-backup-barman-cloud
spec:
  schedule: "@daily"
  immediate: true
  backupOwnerReference: self
  cluster:
    name: spring-notes-cnpg
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: spring-notes-cnpg-backup-volume-snapshot
spec:
  schedule: "@daily"
  immediate: true
  backupOwnerReference: self
  cluster:
    name: spring-notes-cnpg
  method: volumeSnapshot
