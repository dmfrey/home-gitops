---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: spring-notes
spec:
  chartRef:
    kind: OCIRepository
    name: spring-notes
  interval: 1h
  values:
    controllers:

      backend:
        annotations:
          reloader.stakater.com/auto: "true"
          secret.reloader.stakater.com/reload: spring-notes-cnpg-app,spring-notes-secret
        containers:
          app:
            image:
              repository: ghcr.io/dmfrey/spring-notes
              # renovate: datasource=docker depName=ghcr.io/dmfrey/spring-notes versioning=loose
              tag: b9056cdceeb61d89f08a26248107a35d9f0000de
            env:
              TZ: America/New_York
              DEPLOYMENT_ENVIRONMENT: homelab
              # CNPG auto-creates spring-notes-cnpg-app with host/port/dbname/username/password.
              # Kubernetes env var substitution assembles the JDBC URL at runtime.
              DB_HOST:
                valueFrom:
                  secretKeyRef:
                    name: spring-notes-cnpg-app
                    key: host
              DB_PORT:
                valueFrom:
                  secretKeyRef:
                    name: spring-notes-cnpg-app
                    key: port
              DB_NAME:
                valueFrom:
                  secretKeyRef:
                    name: spring-notes-cnpg-app
                    key: dbname
              SPRING_DATASOURCE_URL: "jdbc:postgresql://$(DB_HOST):$(DB_PORT)/$(DB_NAME)"
              SPRING_DATASOURCE_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: spring-notes-cnpg-app
                    key: username
              SPRING_DATASOURCE_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: spring-notes-cnpg-app
                    key: password
              LOGGING_STRUCTURED_FORMAT_CONSOLE: ecs
              SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: https://auth.dmfrey.com/application/o/spring-notes/
              SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_AUDIENCES:
                valueFrom:
                  secretKeyRef:
                    name: spring-notes-secret
                    key: AUTHENTIK_CLIENT_ID
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /actuator/health/liveness
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /actuator/health/readiness
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  failureThreshold: 3
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi

      sbom-submit:
        type: cronjob
        cronjob:
          schedule: "@daily"
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 1
        containers:
          app:
            image:
              repository: curlimages/curl
              tag: 8.19.0
              pullPolicy: IfNotPresent
            env:
              DEPENDENCY_TRACK_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: spring-notes-dtrack-secret
                    key: DEPENDENCY_TRACK_API_KEY
            command:
              - /bin/sh
              - -c
              - |
                curl -sf http://spring-notes-backend.spring-notes.svc.cluster.local:8080/actuator/sbom/application -o /tmp/sbom.json &&
                curl -sf -X POST \
                  http://dependency-track-api.security.svc.cluster.local:8080/api/v1/bom \
                  -H "X-API-Key: ${DEPENDENCY_TRACK_API_KEY}" \
                  -F "project=66ca30fd-78af-4ffd-8a55-5cc5109d2d26" \
                  -F "bom=@/tmp/sbom.json"
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}

      frontend:
        containers:
          app:
            image:
              repository: ghcr.io/dmfrey/spring-notes-frontend
              # renovate: datasource=docker depName=ghcr.io/dmfrey/spring-notes-frontend versioning=loose
              tag: c1a21eebdcd29df0eca4378506f7663da4ad67c4
            probes:
              liveness: &probes
                enabled: true
                custom: false
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi

    configMaps:
      frontend-config:
        data:
          config.json: |
            {
              "OIDC_ISSUER": "https://auth.dmfrey.com/application/o/spring-notes/",
              "OIDC_CLIENT_ID": "spring-notes",
              "OIDC_SCOPE": "openid profile email",
              "API_BASE_URL": "/api"
            }

    persistence:
      frontend-config:
        type: configMap
        name: spring-notes
        advancedMounts:
          frontend:
            app:
              - path: /usr/share/nginx/html/config.json
                subPath: config.json
                readOnly: true
      tmp:
        type: emptyDir
        advancedMounts:
          sbom-submit:
            app:
              - path: /tmp

    service:
      backend:
        controller: backend
        ports:
          http:
            port: 8080
      frontend:
        controller: frontend
        ports:
          http:
            port: 80

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Tools
          gethomepage.dev/name: Spring Notes
          gethomepage.dev/icon: spring.png
          gethomepage.dev/description: Spring Boot + React Demo
        hostnames:
          - spring-notes.dmfrey.com
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          # /api/* → strip /api prefix → Spring Boot backend (port 8080)
          # Backend endpoints are at /notes, not /api/notes — no context path configured.
          - matches:
              - path:
                  type: PathPrefix
                  value: /api
            filters:
              - type: URLRewrite
                urlRewrite:
                  path:
                    type: ReplacePrefixMatch
                    replacePrefixMatch: /
            backendRefs:
              - identifier: backend
                port: 8080
          # /* → React frontend (nginx, port 80)
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: frontend
                port: 80

