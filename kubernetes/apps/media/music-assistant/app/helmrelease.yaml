---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: music-assistant
spec:
  chartRef:
    kind: OCIRepository
    name: music-assistant
  interval: 1h
  values:
    controllers:
      music-assistant:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/music-assistant/server
              tag: 2.8.4@sha256:f25ab51703e81e18c90d023916d2bc7c8b1ef98b99503644fc12277bacc69ecd
            env:
              TZ: America/New_York
              LOG_LEVEL: info
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8095
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 10m
                memory: 512Mi
              limits:
                memory: 2048Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {add: ["DAC_READ_SEARCH", "SYS_ADMIN"]}
        pod:
          annotations:
            k8s.v1.cni.cncf.io/networks: |
              [{
                "name": "iot-vlan",
                "namespace": "kube-system",
                "ips": ["192.168.50.5/24", "${IPV6_IOT_PREFIX}:5::1/64"],
                "mac": "ae:81:6a:d4:48:85"
              }]
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}
    service:
      app:
        ports:
          http:
            port: &port 8095
          stream:
            port: &streamPort 8097
          http2:
            port: 1780
          sxm-proxy:
            port: 8100
            # snapserver-player:
            #   port: 1704
            # snapserver-control:
            #   port: 1705
            # squeeze-cli:
            #   port: 9090
            # squeeze-rpc:
            #   port: 9000
            # squeeze-slimproto:
            #   port: 3483
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.dmfrey.com"
          - music.dmfrey.com
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /data
      media:
        type: nfs
        server: nas.internal
        path: /media/music/
        globalMounts:
          - path: /media
      tmp:
        type: emptyDir
        medium: Memory
        globalMounts:
          - path: /tmp
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /.audio
            subPath: .audio
