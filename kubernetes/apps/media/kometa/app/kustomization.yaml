---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./externalsecret.yaml
  - ./helmrelease.yaml
  - ./ocirepository.yaml

configMapGenerator:
  - name: kometa-config-template
    files:
      - ./config/config.yml
    options:
      labels:
        kustomize.toolkit.fluxcd.io/substitute: disabled
  - name: kometa-playlists
    files:
      - ./config/playlists.yml
    options:
      labels:
        kustomize.toolkit.fluxcd.io/substitute: disabled
  - name: kometa-prerolls
    files:
      - ./config/pre-rolls.yml
  - name: kometa-scripts
    files:
      - ./scripts/run.sh

generatorOptions:
  disableNameSuffixHash: true
