---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kometa

spec:

  interval: 1h

  chartRef:
    kind: OCIRepository
    name: kometa

  values:

    controllers:

      kometa:
        type: cronjob
        annotations:
          secret.reloader.stakater.com/reload: kometa-secret

        cronjob:
          schedule: 0 6 * * *

        containers:
          app:
            image:
              repository: docker.io/kometateam/kometa
              tag: v2.3.1

            env:
              TZ: America/New_York

            command:
              - /scripts/run.sh

        initContainers:
          config-setup:
            image:
              repository: ghcr.io/dmfrey/bash
              tag: 5.2.26-alpine3.20

            command:
              - "/bin/sh"
              - -c
              - |
                env
                mkdir -p /config/assets
                envsubst < /tmp/config-template/config.yml > /config/config.yml
                exit 0

            envFrom:
              - secretRef:
                  name: kometa-secret

    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"

      config-playlists:
        type: configMap
        name: kometa-playlists
        globalMounts:
          - path: /config/playlists.yml
            subPath: playlists.yml
            readOnly: true

      config-prerolls:
        type: configMap
        name: kometa-prerolls
        globalMounts:
          - path: /config/pre-rolls.yml
            subPath: pre-rolls.yml
            readOnly: true

      config-template:
        type: configMap
        name: kometa-config-template
        globalMounts:
          - path: /tmp/config-template
            readOnly: true

      scripts:
        type: configMap
        name: kometa-scripts
        globalMounts:
          - path: /scripts/run.sh
            subPath: run.sh
            readOnly: false
        defaultMode: 0775
