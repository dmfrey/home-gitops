---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: romm
spec:
  chartRef:
    kind: OCIRepository
    name: romm
  interval: 1h
  values:
    controllers:
      romm:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: rommapp/romm
              tag: 4.8.0
            env:
              TZ: America/New_York
              ENABLE_SCHEDULED_RESCAN: "true"
              SCHEDULED_RESCAN_CRON: "0 3 * * *"
              ENABLE_SCHEDULED_UPDATE_SWITCH_TITLEDB: "false"
              ENABLE_SCHEDULED_UPDATE_MAME_XML: "false"
              ENABLE_RESCAN_ON_FILESYSTEM_CHANGE: "true"
              RESCAN_ON_FILESYSTEM_CHANGE_DELAY: 5
              FLASHPOINT_API_ENABLED: true
              HLTB_API_ENABLED: true
              HASHEOUS_API_ENABLED: true
              LAUNCHBOX_API_ENABLED: true
              ENABLE_SCHEDULED_UPDATE_LAUNCHBOX_METADATA: true
              PLAYMATCH_API_ENABLED: true
              ROMM_PORT: &port 8080
              ROMM_DB_DRIVER: postgresql
              DB_HOST:
                valueFrom:
                  secretKeyRef:
                    name: romm-cnpg-app
                    key: host
              DB_PORT:
                valueFrom:
                  secretKeyRef:
                    name: romm-cnpg-app
                    key: port
              DB_NAME:
                valueFrom:
                  secretKeyRef:
                    name: romm-cnpg-app
                    key: dbname
              DB_USER:
                valueFrom:
                  secretKeyRef:
                    name: romm-cnpg-app
                    key: username
              DB_PASSWD:
                valueFrom:
                  secretKeyRef:
                    name: romm-cnpg-app
                    key: password
              REDIS_HOST: romm-dragonflydb.media.svc.cluster.local
              REDIS_PORT: 6379
              OIDC_ENABLED: true
              OIDC_PROVIDER: authentik
              OIDC_CLIENT_ID:
                valueFrom:
                  secretKeyRef:
                    name: romm-secret
                    key: ROMM_CLIENT_ID
              OIDC_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: romm-secret
                    key: ROMM_CLIENT_SECRET
              OIDC_REDIRECT_URI: https://romm.dmfrey.com/api/oauth/openid
              OIDC_SERVER_APPLICATION_URL: https://auth.dmfrey.com/application/o/romm
            envFrom:
              - secretRef:
                  name: romm-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/heartbeat
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 25m
                memory: 512Mi
              limits:
                memory: 4Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 200"]
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Games
          gethomepage.dev/name: RomM
          gethomepage.dev/icon: romm.png
          gethomepage.dev/description: Retro Games
          gethomepage.dev/widget.type: romm
          gethomepage.dev/widget.url: http://romm.media.svc.cluster.local:8080
        hostnames:
          - "{{ .Release.Name }}.dmfrey.com"
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
    persistence:
      romm:
        existingClaim: "{{ .Release.Name }}"
      romm-config:
        type: nfs
        server: nas.internal
        path: /games/config
        globalMounts:
          - path: /romm/config
      romm-assets:
        type: nfs
        server: nas.internal
        path: /games/assets
        globalMounts:
          - path: /romm/assets
      romm-library:
        type: nfs
        server: nas.internal
        path: /games/library
        globalMounts:
          - path: /romm/library
      romm-resources:
        type: nfs
        server: nas.internal
        path: /games/resources
        globalMounts:
          - path: /romm/resources
      nginx-conf:
        type: emptyDir
        medium: Memory
        globalMounts:
          - path: /etc/nginx/conf.d
      tmp:
        type: emptyDir
        medium: Memory
