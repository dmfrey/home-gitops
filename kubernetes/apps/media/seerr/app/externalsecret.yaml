---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: seerr
spec:
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  refreshInterval: 15m
  target:
    name: seerr-secret
    template:
      engineVersion: v2
      data:
        SEERR_API_KEY: "{{ .SEERR_API_KEY }}"
        SEERR_CLIENT_ID: "{{ .SEERR_CLIENT_ID }}"
        SEERR_VAPID_PRIVATE: "{{ .SEERR_VAPID_PRIVATE }}"
        SEERR_VAPID_PUBLIC: "{{ .SEERR_VAPID_PUBLIC }}"
        SEERR_PUSHOVER_ACCESS_KEY: "{{ .PUSHOVER_SEERR_API_KEY }}"
        SEERR_PUSHOVER_USER_KEY: "{{ .PUSHOVER_USER_KEY }}"
        PLEX_SERVER_ID: "{{ .PLEX_SERVER_ID }}"
        RADARR_API_KEY: "{{ .RADARR_API_KEY }}"
        SONARR_API_KEY: "{{ .SONARR_API_KEY }}"
        TAUTULLI_API_KEY: "{{ .TAUTULLI_API_KEY }}"
  dataFrom:
    - extract:
        key: seerr
    - extract:
        key: plex
    - extract:
        key: pushover
    - extract:
        key: radarr
    - extract:
        key: sonarr
    - extract:
        key: tautulli
