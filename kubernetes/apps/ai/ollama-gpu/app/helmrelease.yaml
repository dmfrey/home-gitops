---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama-gpu

spec:

  chartRef:
    kind: OCIRepository
    name: ollama-gpu

  interval: 1h

  valuesFrom:
    - kind: ConfigMap
      name: ollama-gpu-values

  values:

    controllers:
      ollama-gpu:
        type: statefulset
        # Testing 2026-07-20 - ollama (Intel) scaled to 0 alongside this.
        replicas: 1

        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              repository: docker.io/ollama/ollama
              tag: "0.32.1"

            env:
              TZ: America/New_York
              OLLAMA_HOST: 0.0.0.0
              OLLAMA_ORIGINS: "*"
              OLLAMA_MODELS: /models
              OLLAMA_KEEP_ALIVE: "-1"

            resources:
              claims:
                - name: gpu
              requests:
                cpu: 200m
                memory: 4Gi
              limits:
                memory: 24Gi

        pod:
          resourceClaims:
            - name: gpu
              resourceClaimTemplateName: ollama-gpu
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - topologyKey: "kubernetes.io/hostname"
                  labelSelector:
                    matchExpressions:
                      - key: app.kubernetes.io/name
                        operator: In
                        values:
                          - "{{ .Release.Name }}"

    persistence:
      config:
        enabled: true
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /root/.ollama

      models:
        type: nfs
        server: nas.internal
        path: /models
        globalMounts:
          - path: /models

      tmp:
        enabled: true
        type: emptyDir
        medium: Memory
        globalMounts:
          - path: /tmp
