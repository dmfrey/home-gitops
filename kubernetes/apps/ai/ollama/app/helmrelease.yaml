---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama

spec:

  chartRef:
    kind: OCIRepository
    name: ollama

  interval: 1h

  valuesFrom:
    - kind: ConfigMap
      name: ollama-values

  values:

    controllers:
      ollama:
        type: statefulset
        replicas: 1

        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              repository: docker.io/uberchuckie/ollama-intel-gpu
              tag: stable

            env:
              TZ: America/New_York
              OLLAMA_HOST: 0.0.0.0
              OLLAMA_ORIGINS: "*"
              OLLAMA_MODELS: /models
              ZES_ENABLE_SYSMAN: 1
              DRINODE: /dev/dri/renderD128

            resources:
              claims:
                - name: gpu
              requests:
                cpu: 200m
                memory: 4Gi
              limits:
                memory: 24Gi

        pod:
          resourceClaims:
            - name: gpu
              resourceClaimTemplateName: ollama
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - topologyKey: "kubernetes.io/hostname"
                  labelSelector:
                    matchExpressions:
                      - key: app.kubernetes.io/name
                        operator: In
                        values:
                          - "{{ .Release.Name }}"

    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 192.168.29.241
        ports:
          http:
            port: 11434

    route:
      app:
        hostnames:
          - ollama.dmfrey.com
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https

    persistence:
      config:
        enabled: true
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /root/.ollama

      models:
        type: nfs
        server: nas.internal
        path: /models
        globalMounts:
          - path: /models

      tmp:
        enabled: true
        type: emptyDir
        medium: Memory
        globalMounts:
          - path: /tmp
