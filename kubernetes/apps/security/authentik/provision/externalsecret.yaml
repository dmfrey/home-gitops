---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: terraform
spec:
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  refreshInterval: 15m
  target:
    name: terraform-secret
    template:
      engineVersion: v2
      data:
        # Authentik provider token
        AUTHENTIK_TOKEN: "{{ .AUTHENTIK_TOKEN }}"
        AUTHENTIK_PLEX_CLIENT_ID: "{{ .AUTHENTIK_PLEX_CLIENT_ID }}"
        AUTHENTIK_PLEX_TOKEN: "{{ .AUTHENTIK_PLEX_TOKEN }}"
        # OAuth app credentials
        AFFINE_CLIENT_ID: "{{ .AFFINE_CLIENT_ID }}"
        AFFINE_CLIENT_SECRET: "{{ .AFFINE_CLIENT_SECRET }}"
        FRESHRSS_CLIENT_ID: "{{ .FRESHRSS_CLIENT_ID }}"
        FRESHRSS_CLIENT_SECRET: "{{ .FRESHRSS_CLIENT_SECRET }}"
        GATUS_CLIENT_ID: "{{ .GATUS_CLIENT_ID }}"
        GATUS_CLIENT_SECRET: "{{ .GATUS_CLIENT_SECRET }}"
        GRAFANA_CLIENT_ID: "{{ .GRAFANA_CLIENT_ID }}"
        GRAFANA_CLIENT_SECRET: "{{ .GRAFANA_CLIENT_SECRET }}"
        JELLYFIN_CLIENT_ID: "{{ .JELLYFIN_CLIENT_ID }}"
        JELLYFIN_CLIENT_SECRET: "{{ .JELLYFIN_CLIENT_SECRET }}"
        LINKWARDEN_CLIENT_ID: "{{ .LINKWARDEN_CLIENT_ID }}"
        LINKWARDEN_CLIENT_SECRET: "{{ .LINKWARDEN_CLIENT_SECRET }}"
        OPENWEB_CLIENT_ID: "{{ .OPENWEB_CLIENT_ID }}"
        OPENWEB_CLIENT_SECRET: "{{ .OPENWEB_CLIENT_SECRET }}"
        PINEPODS_CLIENT_ID: "{{ .PINEPODS_CLIENT_ID }}"
        PINEPODS_CLIENT_SECRET: "{{ .PINEPODS_CLIENT_SECRET }}"
        ROMM_CLIENT_ID: "{{ .ROMM_CLIENT_ID }}"
        ROMM_CLIENT_SECRET: "{{ .ROMM_CLIENT_SECRET }}"
        SPRING_DEV_CLIENT_ID: "{{ .SPRING_DEV_CLIENT_ID }}"
        SPRING_DEV_CLIENT_SECRET: "{{ .SPRING_DEV_CLIENT_SECRET }}"
        SPRING_NOTES_CLIENT_ID: "{{ .SPRING_NOTES_CLIENT_ID }}"
        SPRING_NOTES_CLIENT_SECRET: "{{ .SPRING_NOTES_CLIENT_SECRET }}"
        DEPENDENCY_TRACK_CLIENT_ID: "{{ .DEPENDENCY_TRACK_CLIENT_ID }}"
        DEPENDENCY_TRACK_CLIENT_SECRET: "{{ .DEPENDENCY_TRACK_CLIENT_SECRET }}"
        # User credentials
        USERS_DMFREY_NAME: "{{ .USERS_DMFREY_NAME }}"
        USERS_DMFREY_EMAIL: "{{ .USERS_DMFREY_EMAIL }}"
        USERS_DMFREY_PASSWORD: "{{ .USERS_DMFREY_PASSWORD }}"
        USERS_SDFREY_NAME: "{{ .USERS_SDFREY_NAME }}"
        USERS_SDFREY_EMAIL: "{{ .USERS_SDFREY_EMAIL }}"
        USERS_SDFREY_PASSWORD: "{{ .USERS_SDFREY_PASSWORD }}"
        USERS_CGFREY_NAME: "{{ .USERS_CGFREY_NAME }}"
        USERS_CGFREY_EMAIL: "{{ .USERS_CGFREY_EMAIL }}"
        USERS_CGFREY_PASSWORD: "{{ .USERS_CGFREY_PASSWORD }}"
        USERS_MKFREY_NAME: "{{ .USERS_MKFREY_NAME }}"
        USERS_MKFREY_EMAIL: "{{ .USERS_MKFREY_EMAIL }}"
        USERS_MKFREY_PASSWORD: "{{ .USERS_MKFREY_PASSWORD }}"
        USERS_ADFREY_NAME: "{{ .USERS_ADFREY_NAME }}"
        USERS_ADFREY_EMAIL: "{{ .USERS_ADFREY_EMAIL }}"
        USERS_ADFREY_PASSWORD: "{{ .USERS_ADFREY_PASSWORD }}"
  data:
    # Authentik item
    - secretKey: AUTHENTIK_TOKEN
      remoteRef:
        key: authentik
        property: AUTHENTIK_TOKEN
    - secretKey: AUTHENTIK_PLEX_CLIENT_ID
      remoteRef:
        key: authentik
        property: AUTHENTIK_PLEX_CLIENT_ID
    - secretKey: AUTHENTIK_PLEX_TOKEN
      remoteRef:
        key: authentik
        property: AUTHENTIK_PLEX_TOKEN
    # Per-app credentials (each app item uses AUTHENTIK_CLIENT_ID / AUTHENTIK_CLIENT_SECRET field names)
    - secretKey: AFFINE_CLIENT_ID
      remoteRef:
        key: affine
        property: AUTHENTIK_CLIENT_ID
    - secretKey: AFFINE_CLIENT_SECRET
      remoteRef:
        key: affine
        property: AUTHENTIK_CLIENT_SECRET
    - secretKey: FRESHRSS_CLIENT_ID
      remoteRef:
        key: freshrss
        property: AUTHENTIK_CLIENT_ID
    - secretKey: FRESHRSS_CLIENT_SECRET
      remoteRef:
        key: freshrss
        property: AUTHENTIK_CLIENT_SECRET
    - secretKey: GATUS_CLIENT_ID
      remoteRef:
        key: gatus
        property: AUTHENTIK_CLIENT_ID
    - secretKey: GATUS_CLIENT_SECRET
      remoteRef:
        key: gatus
        property: AUTHENTIK_CLIENT_SECRET
    - secretKey: GRAFANA_CLIENT_ID
      remoteRef:
        key: grafana
        property: AUTHENTIK_CLIENT_ID
    - secretKey: GRAFANA_CLIENT_SECRET
      remoteRef:
        key: grafana
        property: AUTHENTIK_CLIENT_SECRET
    - secretKey: JELLYFIN_CLIENT_ID
      remoteRef:
        key: jellyfin
        property: AUTHENTIK_CLIENT_ID
    - secretKey: JELLYFIN_CLIENT_SECRET
      remoteRef:
        key: jellyfin
        property: AUTHENTIK_CLIENT_SECRET
    - secretKey: LINKWARDEN_CLIENT_ID
      remoteRef:
        key: linkwarden
        property: AUTHENTIK_CLIENT_ID
    - secretKey: LINKWARDEN_CLIENT_SECRET
      remoteRef:
        key: linkwarden
        property: AUTHENTIK_CLIENT_SECRET
    - secretKey: OPENWEB_CLIENT_ID
      remoteRef:
        key: openweb
        property: AUTHENTIK_CLIENT_ID
    - secretKey: OPENWEB_CLIENT_SECRET
      remoteRef:
        key: openweb
        property: AUTHENTIK_CLIENT_SECRET
    - secretKey: PINEPODS_CLIENT_ID
      remoteRef:
        key: pinepods
        property: AUTHENTIK_CLIENT_ID
    - secretKey: PINEPODS_CLIENT_SECRET
      remoteRef:
        key: pinepods
        property: AUTHENTIK_CLIENT_SECRET
    - secretKey: ROMM_CLIENT_ID
      remoteRef:
        key: romm
        property: AUTHENTIK_CLIENT_ID
    - secretKey: ROMM_CLIENT_SECRET
      remoteRef:
        key: romm
        property: AUTHENTIK_CLIENT_SECRET
    - secretKey: SPRING_DEV_CLIENT_ID
      remoteRef:
        key: spring-dev
        property: AUTHENTIK_CLIENT_ID
    - secretKey: SPRING_DEV_CLIENT_SECRET
      remoteRef:
        key: spring-dev
        property: AUTHENTIK_CLIENT_SECRET
    - secretKey: SPRING_NOTES_CLIENT_ID
      remoteRef:
        key: spring-notes
        property: AUTHENTIK_CLIENT_ID
    - secretKey: SPRING_NOTES_CLIENT_SECRET
      remoteRef:
        key: spring-notes
        property: AUTHENTIK_CLIENT_SECRET
    - secretKey: DEPENDENCY_TRACK_CLIENT_ID
      remoteRef:
        key: dependency-track
        property: AUTHENTIK_CLIENT_ID
    - secretKey: DEPENDENCY_TRACK_CLIENT_SECRET
      remoteRef:
        key: dependency-track
        property: AUTHENTIK_CLIENT_SECRET
    # Users item
    - secretKey: USERS_DMFREY_NAME
      remoteRef:
        key: users
        property: USERS_DMFREY_NAME
    - secretKey: USERS_DMFREY_EMAIL
      remoteRef:
        key: users
        property: USERS_DMFREY_EMAIL
    - secretKey: USERS_DMFREY_PASSWORD
      remoteRef:
        key: users
        property: USERS_DMFREY_PASSWORD
    - secretKey: USERS_SDFREY_NAME
      remoteRef:
        key: users
        property: USERS_SDFREY_NAME
    - secretKey: USERS_SDFREY_EMAIL
      remoteRef:
        key: users
        property: USERS_SDFREY_EMAIL
    - secretKey: USERS_SDFREY_PASSWORD
      remoteRef:
        key: users
        property: USERS_SDFREY_PASSWORD
    - secretKey: USERS_CGFREY_NAME
      remoteRef:
        key: users
        property: USERS_CGFREY_NAME
    - secretKey: USERS_CGFREY_EMAIL
      remoteRef:
        key: users
        property: USERS_CGFREY_EMAIL
    - secretKey: USERS_CGFREY_PASSWORD
      remoteRef:
        key: users
        property: USERS_CGFREY_PASSWORD
    - secretKey: USERS_MKFREY_NAME
      remoteRef:
        key: users
        property: USERS_MKFREY_NAME
    - secretKey: USERS_MKFREY_EMAIL
      remoteRef:
        key: users
        property: USERS_MKFREY_EMAIL
    - secretKey: USERS_MKFREY_PASSWORD
      remoteRef:
        key: users
        property: USERS_MKFREY_PASSWORD
    - secretKey: USERS_ADFREY_NAME
      remoteRef:
        key: users
        property: USERS_ADFREY_NAME
    - secretKey: USERS_ADFREY_EMAIL
      remoteRef:
        key: users
        property: USERS_ADFREY_EMAIL
    - secretKey: USERS_ADFREY_PASSWORD
      remoteRef:
        key: users
        property: USERS_ADFREY_PASSWORD
