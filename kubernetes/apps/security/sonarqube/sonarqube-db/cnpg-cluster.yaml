---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: sonarqube-cnpg
  annotations:
    cnpg.io/skipEmptyWalArchiveCheck: "enabled"

spec:

  instances: 1
  enablePDB: false
  imageName: ghcr.io/cloudnative-pg/postgresql:17.7

  managed:
    services:
      disabledDefaultServices:
        - ro

  backup:
    volumeSnapshot:
      className: csi-ceph-blockpool

  bootstrap:
    initdb:
      dataChecksums: true
      database: sonarqube
      owner: sonarqube
      encoding: "UTF8"
      localeCollate: en_US.utf8
      localeCType: en_US.utf8
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS pg_trgm;

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: sonarqube

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: 256MB

  primaryUpdateStrategy: unsupervised
  primaryUpdateMethod: restart

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

  storage:
    storageClass: ceph-block
    size: 10Gi

  walStorage:
    storageClass: ceph-block
    size: 5Gi
