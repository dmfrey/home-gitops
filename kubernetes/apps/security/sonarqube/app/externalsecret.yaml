---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name sonarqube-secret
spec:
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  refreshInterval: 15m
  target:
    name: *name
    template:
      engineVersion: v2
      data:
        SONAR_AUTH_SAML_CERTIFICATE: '{{ .AUTHENTIK_SAML_CERTIFICATE }}'
  dataFrom:
    - extract:
        key: sonarqube
