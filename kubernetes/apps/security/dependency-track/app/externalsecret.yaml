---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name dependency-track-secret
spec:
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  refreshInterval: 15m
  target:
    name: *name
    template:
      engineVersion: v2
      data:
        # NVD/GitHub Advisories/OSS Index credentials are no longer env-based in v5;
        # they are entered via the in-app secret manager (values remain in 1Password).
        DT_SECRET_MANAGEMENT_DATABASE_KEK: '{{ .DT_SECRET_MANAGEMENT_DATABASE_KEK }}'
        DT_OIDC_CLIENT_ID: '{{ .AUTHENTIK_CLIENT_ID }}'
  dataFrom:
    - extract:
        key: dependency-track
