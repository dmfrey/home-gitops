---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name dependency-track-secret
spec:
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  refreshInterval: 15m
  target:
    name: *name
    template:
      engineVersion: v2
      data:
        ALPINE_SECRET_KEY: '{{ .ALPINE_SECRET_KEY }}'
        ALPINE_OIDC_CLIENT_ID: '{{ .AUTHENTIK_CLIENT_ID }}'
  dataFrom:
    - extract:
        key: dependency-track
