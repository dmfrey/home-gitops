---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dependency-track
spec:
  chartRef:
    kind: OCIRepository
    name: dependency-track
  interval: 1h
  values:
    controllers:
      api:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/dependencytrack/apiserver
              tag: 5.0.3
              pullPolicy: IfNotPresent
            env:
              # v5 requires UTC, see https://dependencytrack.github.io/docs/next/guides/administration/migrating-from-v4/
              TZ: Etc/UTC
              DT_DATASOURCE_URL: jdbc:postgresql://dependency-track-v5-cnpg-rw.security.svc.cluster.local:5432/dependency-track
              DT_DATASOURCE_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: dependency-track-v5-cnpg-app
                    key: username
              DT_DATASOURCE_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: dependency-track-v5-cnpg-app
                    key: password
              DT_SECRET_MANAGEMENT_PROVIDER: database
              DT_SECRET_MANAGEMENT_DATABASE_KEK:
                valueFrom:
                  secretKeyRef:
                    name: dependency-track-secret
                    key: DT_SECRET_MANAGEMENT_DATABASE_KEK
              DT_OIDC_ENABLED: "true"
              DT_OIDC_ISSUER: https://auth.dmfrey.com/application/o/dependency-track/
              DT_OIDC_CLIENT_ID:
                valueFrom:
                  secretKeyRef:
                    name: dependency-track-secret
                    key: DT_OIDC_CLIENT_ID
              # SMTP relay is an in-cluster address, blocked by default SSRF guard
              DT_NOTIFICATION_PUBLISHER_EMAIL_ALLOW_LOCAL_CONNECTIONS: "true"
              DT_OIDC_USERNAME_CLAIM: preferred_username
              DT_OIDC_TEAMS_CLAIM: groups
              DT_OIDC_TEAM_SYNCHRONIZATION: "true"
              DT_OIDC_USER_PROVISIONING: "true"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/live
                    port: 9000
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/ready
                    port: 9000
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/started
                    port: 9000
                  initialDelaySeconds: 30
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 40
            resources:
              requests:
                cpu: 200m
                memory: 2Gi
              limits:
                memory: 6Gi
      frontend:
        containers:
          app:
            image:
              repository: ghcr.io/dependencytrack/frontend
              tag: 5.0.2
              pullPolicy: IfNotPresent
            env:
              API_BASE_URL: https://dtrack-api.dmfrey.com
              OIDC_ISSUER: https://auth.dmfrey.com/application/o/dependency-track/
              OIDC_CLIENT_ID:
                valueFrom:
                  secretKeyRef:
                    name: dependency-track-secret
                    key: DT_OIDC_CLIENT_ID
              OIDC_SCOPE: openid profile email
              OIDC_LOGIN_BUTTON_TEXT: Login with Authentik
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                memory: 128Mi
    defaultPodOptions:
      securityContext:
        seccompProfile: {type: RuntimeDefault}
    service:
      api:
        controller: api
        ports:
          http:
            port: &apiPort 8080
      frontend:
        controller: frontend
        ports:
          http:
            port: &frontendPort 8080
    route:
      api:
        hostnames:
          - dtrack-api.dmfrey.com
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: dependency-track-api
                port: *apiPort
      frontend:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/icon: dependency-track.png
          gethomepage.dev/name: Dependency-Track
          gethomepage.dev/group: Security
          gethomepage.dev/app: dependency-track
          gethomepage.dev/description: Software Supply Chain Security
        hostnames:
          - dtrack.dmfrey.com
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: dependency-track-frontend
                port: *frontendPort
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          api:
            app:
              - path: /data
