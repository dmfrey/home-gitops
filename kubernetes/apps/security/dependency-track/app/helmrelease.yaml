---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dependency-track
spec:
  chartRef:
    kind: OCIRepository
    name: dependency-track
  interval: 1h
  values:
    controllers:
      api:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: dependencytrack/apiserver
              tag: 4.14.1
              pullPolicy: IfNotPresent
            env:
              TZ: America/New_York
              ALPINE_DATABASE_MODE: external
              ALPINE_DATABASE_URL: jdbc:postgresql://dependency-track-cnpg-rw.security.svc.cluster.local:5432/dependency-track
              ALPINE_DATABASE_DRIVER: org.postgresql.Driver
              ALPINE_DATABASE_DRIVER_PATH: /extlib
              ALPINE_DATABASE_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: dependency-track-cnpg-app
                    key: username
              ALPINE_DATABASE_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: dependency-track-cnpg-app
                    key: password
              ALPINE_SECRET_KEY:
                valueFrom:
                  secretKeyRef:
                    name: dependency-track-secret
                    key: ALPINE_SECRET_KEY
              ALPINE_NVD_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: dependency-track-secret
                    key: ALPINE_NVD_API_KEY
              ALPINE_OIDC_ENABLED: "true"
              ALPINE_OIDC_ISSUER: https://auth.dmfrey.com/application/o/dependency-track/
              ALPINE_OIDC_CLIENT_ID:
                valueFrom:
                  secretKeyRef:
                    name: dependency-track-secret
                    key: ALPINE_OIDC_CLIENT_ID
              ALPINE_OIDC_USERNAME_CLAIM: preferred_username
              ALPINE_OIDC_TEAMS_CLAIM: groups
              ALPINE_OIDC_TEAM_SYNCHRONIZATION: "true"
              ALPINE_OIDC_USER_PROVISIONING: "true"
              ALPINE_APPLICATION_BASE_URL: https://dtrack.dmfrey.com
              ALPINE_EMAIL_SMTP_ENABLED: "true"
              ALPINE_EMAIL_SMTP_FROM_ADDRESS: noreply@homelab5767.cc
              ALPINE_EMAIL_SMTP_FROM_NAME: Dependency-Track
              ALPINE_EMAIL_SMTP_HOST: smtp-relay.kube-system.svc.cluster.local
              ALPINE_EMAIL_SMTP_PORT: "25"
              ALPINE_EMAIL_SMTP_SSLTLS: "false"
              ALPINE_EMAIL_SMTP_TRUSTCERT: "false"
            probes:
              liveness: &apiProbes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/version
                    port: 8080
                  initialDelaySeconds: 60
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *apiProbes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/version
                    port: 8080
                  initialDelaySeconds: 60
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 20
            resources:
              requests:
                cpu: 200m
                memory: 2Gi
              limits:
                memory: 6Gi
      frontend:
        containers:
          app:
            image:
              repository: dependencytrack/frontend
              tag: 4.14.1
              pullPolicy: IfNotPresent
            env:
              API_BASE_URL: https://dtrack-api.dmfrey.com
              OIDC_ISSUER: https://auth.dmfrey.com/application/o/dependency-track/
              OIDC_CLIENT_ID:
                valueFrom:
                  secretKeyRef:
                    name: dependency-track-secret
                    key: ALPINE_OIDC_CLIENT_ID
              OIDC_SCOPE: openid profile email
              OIDC_FLOW: authorization_code
              OIDC_LOGIN_BUTTON_TEXT: Login with Authentik
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                memory: 128Mi
    defaultPodOptions:
      securityContext:
        seccompProfile: {type: RuntimeDefault}
    service:
      api:
        controller: api
        ports:
          http:
            port: &apiPort 8080
      frontend:
        controller: frontend
        ports:
          http:
            port: &frontendPort 8080
    route:
      api:
        hostnames:
          - dtrack-api.dmfrey.com
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: dependency-track-api
                port: *apiPort
      frontend:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/icon: dependency-track.png
          gethomepage.dev/name: Dependency-Track
          gethomepage.dev/group: Security
          gethomepage.dev/app: dependency-track
          gethomepage.dev/description: Software Supply Chain Security
        hostnames:
          - dtrack.dmfrey.com
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: dependency-track-frontend
                port: *frontendPort
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          api:
            app:
              - path: /data
