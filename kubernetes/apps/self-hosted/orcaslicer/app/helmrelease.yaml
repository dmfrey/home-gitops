---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: orcaslicer
spec:
  chartRef:
    kind: OCIRepository
    name: orcaslicer
  interval: 1h
  values:
    controllers:
      orcaslicer:
        initContainers:
          cert-inject:
            image:
              repository: ghcr.io/linuxserver/orcaslicer
              tag: 2.4.2
            command:
              - /bin/sh
              - -c
              - |
                cp /opt/orcaslicer/resources/cert/printer.cer /certs/printer.cer
                cat /bambuddy-ca/bbl_ca.crt >> /certs/printer.cer
        containers:
          app:
            image:
              repository: ghcr.io/linuxserver/orcaslicer
              tag: 2.4.2
            env:
              TZ: America/New_York
              PUID: "911"
              PGID: "911"
              DRINODE: /dev/dri/renderD128
              GTK_THEME: Adwaita:dark
              S6_READ_ONLY_ROOT: "1"
              SELKIES_MANUAL_WIDTH: "1920"
              SELKIES_MANUAL_HEIGHT: "1080"
              MAX_RESOLUTION: 1920x1080
              SELKIES_USE_CPU: "true"
            probes:
              liveness: &probes
                enabled: true
                custom: false
                spec:
                  failureThreshold: 10
              startup: *probes
              readiness: *probes
            resources:
              claims:
                - name: gpu
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                memory: 8Gi
    defaultPodOptions:
      annotations:
        k8s.v1.cni.cncf.io/networks: |
          [{
            "name": "iot-vlan",
            "namespace": "kube-system",
            "ips": ["192.168.50.7/24", "${IPV6_IOT_PREFIX}:4::1/64"],
            "mac": "a6:41:7a:c3:3b:e9"
          }]
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: orcaslicer
    configMaps:
      bambuddy-ca:
        data:
          bbl_ca.crt: |-
            -----BEGIN CERTIFICATE-----
            MIIC7jCCAdagAwIBAgIUdEIlQ4XNF0YX7Wyf35uvvXc/0DEwDQYJKoZIhvcNAQEL
            BQAwHTEbMBkGA1UEAwwSVmlydHVhbCBQcmludGVyIENBMB4XDTI2MDMxMzE4MzAy
            NFoXDTQ2MDMwODE4MzAyNFowHTEbMBkGA1UEAwwSVmlydHVhbCBQcmludGVyIENB
            MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAmk+C9q2jSdZQpZkx7NkQ
            Ju5lLBqRQpxefv6Ck+Ph0nLjogq6Q8UFOPT2w1v5zKw9zPwWEv74YygitVX0CCv1
            CNIhbBal1H3wwQYMWCiJtzDax8gi2jaoknDWQU/TbkTmV/ri0xpFLHI/uFWDds0V
            CBl77k0wq51A5/NOIBVPVl3om5zE01tfOOK+WGynOc+LR09Ai8sq0z31yr0ZcUEV
            HHda5jiQIWA8kY7XeiVpmFDPCiszFITtsAFcZowC+nwf8GkxYuYkZF5RabIHQscS
            M3VjA90XFOdrPk4DkTzN5wGokvibgGJ+ID2AG4l4Oh2G+k/qvzjo+8BlHD7LCDi+
            YwIDAQABoyYwJDASBgNVHRMBAf8ECDAGAQH/AgEAMA4GA1UdDwEB/wQEAwIBhjAN
            BgkqhkiG9w0BAQsFAAOCAQEAJ3MaE/HVPW8Z7T+mcqhC1n+MS2SDJOiu8VJh+KZW
            66LF3y0r0ENABWKvUUr9NiJCSeH/++OOYrQB8lZVfACK8izNgVw6Lm9LQRk4q0n6
            sesTPbq2gG414W27D5bv2biPfZMtloB9Bfi+2X+ep+n0cl0YNqP6zdb2oAD3fzVR
            urBm+1ZxOaW5rLdIge5yYo42acXNRuU9nIRQq14hGvcVwUjMXgoCaCMG71l2jwZV
            yBScDm+qumZsno8IQoSWWJNbAvL0o6ofrtEvLJeaaIDqH2u5Do6SeqC0rOYJ2cvr
            eRqkhF9qWsa/+gYTRI2NSoXlws/nirW6pahqmPv27CYYjw==
            -----END CERTIFICATE-----
    service:
      app:
        ports:
          http:
            port: &port 3000
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Tools
          gethomepage.dev/name: OrcaSlicer
          gethomepage.dev/icon: orcaslicer.png
          gethomepage.dev/description: "3D Printing Slicer"
        hostnames:
          - "{{ .Release.Name }}.dmfrey.com"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /config/.config/OrcaSlicer
            subPath: orcaslicer
          - path: /config/Desktop
            subPath: models
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /run
            subPath: run
          - path: /tmp
            subPath: tmp
          - path: /config
            subPath: config
          - path: /config/.config/OrcaSlicer/log
            subPath: log
          - path: /config/.config/OrcaSlicer/cache
            subPath: cache
      shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Gi
        globalMounts:
          - path: /dev/shm
      cert:
        type: emptyDir
        advancedMounts:
          orcaslicer:
            cert-inject:
              - path: /certs
            app:
              - path: /opt/orcaslicer/resources/cert
      bambuddy-ca:
        type: configMap
        identifier: bambuddy-ca
        advancedMounts:
          orcaslicer:
            cert-inject:
              - path: /bambuddy-ca
