---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: orcaslicer
spec:
  chartRef:
    kind: OCIRepository
    name: orcaslicer
  interval: 1h
  values:
    controllers:
      orcaslicer:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          cert-inject:
            image:
              repository: ghcr.io/linuxserver/orcaslicer
              tag: 2.3.2
            command:
              - /bin/sh
              - -c
              - |
                cp /opt/orcaslicer/resources/cert/printer.cer /certs/printer.cer
                cat /bambuddy-ca/bbl_ca.crt >> /certs/printer.cer
        containers:
          app:
            image:
              repository: ghcr.io/linuxserver/orcaslicer
              tag: 2.3.2
            env:
              TZ: America/New_York
              PUID: "911"
              PGID: "911"
              DRINODE: /dev/dri/renderD128
              GTK_THEME: Adwaita:dark
              S6_READ_ONLY_ROOT: "1"
              SELKIES_MANUAL_WIDTH: "1920"
              SELKIES_MANUAL_HEIGHT: "1080"
              MAX_RESOLUTION: 1920x1080
              SELKIES_ENCODER: vp8enc
            probes:
              liveness: &probes
                enabled: true
                custom: false
                spec:
                  failureThreshold: 10
              startup: *probes
              readiness: *probes
            resources:
              claims:
                - name: gpu
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                memory: 8Gi
    defaultPodOptions:
      annotations:
        k8s.v1.cni.cncf.io/networks: |
          [{
            "name": "iot-vlan",
            "namespace": "kube-system",
            "ips": ["192.168.50.7/24", "${IPV6_IOT_PREFIX}:4::1/64"],
            "mac": "a6:41:7a:c3:3b:e9"
          }]
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: orcaslicer
    service:
      app:
        ports:
          http:
            port: &port 3000
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Tools
          gethomepage.dev/name: OrcaSlicer
          gethomepage.dev/icon: orcaslicer.png
          gethomepage.dev/description: "3D Printing Slicer"
        hostnames:
          - "{{ .Release.Name }}.dmfrey.com"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /config/.config/OrcaSlicer
            subPath: orcaslicer
          - path: /config/Desktop
            subPath: models
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /run
            subPath: run
          - path: /tmp
            subPath: tmp
          - path: /config
            subPath: config
          - path: /config/.config/OrcaSlicer/log
            subPath: log
          - path: /config/.config/OrcaSlicer/cache
            subPath: cache
      shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Gi
        globalMounts:
          - path: /dev/shm
      cert:
        type: emptyDir
        advancedMounts:
          orcaslicer:
            cert-inject:
              - path: /certs
            app:
              - path: /opt/orcaslicer/resources/cert
      bambuddy-ca:
        type: configMap
        name: bambuddy-ca
        advancedMounts:
          orcaslicer:
            cert-inject:
              - path: /bambuddy-ca
