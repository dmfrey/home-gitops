---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: freshrss-cnpg
  annotations:
    cnpg.io/skipEmptyWalArchiveCheck: "enabled"

spec:

  instances: 1
  enablePDB: false
  imageName: ghcr.io/cloudnative-pg/postgresql:17.7

  managed:
    services:
      disabledDefaultServices:
        - ro

  backup:
    volumeSnapshot:
      className: csi-ceph-blockpool

  bootstrap:
    initdb:
      dataChecksums: true
      database: freshrss
      owner: freshrss
      encoding: "UTF8"
      localeCollate: en_US.utf8
      localeCType: en_US.utf8
      # recovery:
      #   database: freshrss
      #   owner: freshrss
      #   source: source

  externalClusters:
    - name: source
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: freshrss
          serverName: freshrss-cnpg

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: freshrss

  postgresql:
    parameters:
      max_connections: "300"
      shared_buffers: 128MB

  primaryUpdateStrategy: unsupervised
  primaryUpdateMethod: restart

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  storage:
    size: 5Gi
    storageClass: ceph-block

  walStorage:
    size: 10Gi
    storageClass: ceph-block
