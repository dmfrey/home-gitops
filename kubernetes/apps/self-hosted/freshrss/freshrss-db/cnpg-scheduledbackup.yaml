---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/postgresql.cnpg.io/scheduledbackup_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: freshrss-cnpg-barman-cloud

spec:
  schedule: "@daily"
  immediate: true
  backupOwnerReference: self

  cluster:
    name: freshrss-cnpg

  method: plugin

  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/postgresql.cnpg.io/scheduledbackup_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: freshrss-cnpg-volume-snapshot

spec:
  schedule: "@daily"
  immediate: true
  backupOwnerReference: self

  cluster:
    name: freshrss-cnpg

  method: volumeSnapshot
