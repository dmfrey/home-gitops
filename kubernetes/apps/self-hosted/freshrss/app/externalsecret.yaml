---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: freshrss
spec:
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  refreshInterval: 15m
  target:
    name: freshrss-secret
    template:
      engineVersion: v2
      data:
        OIDC_CLIENT_ID: "{{ .AUTHENTIK_CLIENT_ID }}"
        OIDC_CLIENT_SECRET: "{{ .AUTHENTIK_CLIENT_SECRET }}"
  dataFrom:
    - extract:
        key: freshrss
