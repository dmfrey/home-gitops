---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: bambuddy
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  json: |-
    {
      "__inputs": [
        {
          "name": "DS_PROMETHEUS",
          "label": "Prometheus",
          "type": "datasource",
          "pluginId": "prometheus",
          "pluginName": "Prometheus"
        }
      ],
      "title": "BambuBuddy",
      "uid": "bambuddy",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "tags": ["bambuddy", "3d-printing"],
      "time": { "from": "now-6h", "to": "now" },
      "timezone": "browser",
      "panels": [
        {
          "type": "stat",
          "title": "Printer Connected",
          "id": 1,
          "gridPos": { "x": 0, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": { "text": "Disconnected", "color": "red", "index": 0 },
                    "1": { "text": "Connected", "color": "green", "index": 1 }
                  }
                }
              ],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }] },
              "color": { "mode": "thresholds" }
            }
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "bambuddy_printer_connected",
              "instant": true,
              "legendFormat": "{{ printer_name }}"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Printer State",
          "id": 2,
          "gridPos": { "x": 4, "y": 0, "w": 5, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": { "text": "Unknown",  "color": "gray",   "index": 0 },
                    "1": { "text": "Idle",     "color": "blue",   "index": 1 },
                    "2": { "text": "Printing", "color": "green",  "index": 2 },
                    "3": { "text": "Paused",   "color": "yellow", "index": 3 },
                    "4": { "text": "Finished", "color": "purple", "index": 4 },
                    "5": { "text": "Failed",   "color": "red",    "index": 5 }
                  }
                }
              ],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "gray", "value": null }] },
              "color": { "mode": "thresholds" }
            }
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "bambuddy_printer_state",
              "instant": true,
              "legendFormat": "{{ printer_name }}"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Print Progress",
          "id": 3,
          "gridPos": { "x": 9, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }, { "color": "green", "value": 100 }] },
              "color": { "mode": "thresholds" }
            }
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "bambuddy_print_progress",
              "instant": true,
              "legendFormat": "{{ printer_name }}"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Remaining Time",
          "id": 4,
          "gridPos": { "x": 13, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] },
              "color": { "mode": "thresholds" }
            }
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "bambuddy_print_remaining_seconds",
              "instant": true,
              "legendFormat": "{{ printer_name }}"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Layer",
          "id": 5,
          "gridPos": { "x": 17, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] },
              "color": { "mode": "thresholds" }
            }
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "value_and_name",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "bambuddy_print_layer_current",
              "instant": true,
              "legendFormat": "Current"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "bambuddy_print_layer_total",
              "instant": true,
              "legendFormat": "Total"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Queue",
          "id": 6,
          "gridPos": { "x": 21, "y": 0, "w": 3, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] },
              "color": { "mode": "thresholds" }
            }
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "value_and_name",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "bambuddy_queue_pending",
              "instant": true,
              "legendFormat": "Pending"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "bambuddy_queue_printing",
              "instant": true,
              "legendFormat": "Printing"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Nozzle Temperature",
          "id": 7,
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "custom": { "lineWidth": 2, "fillOpacity": 10 }
            }
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "bambuddy_nozzle_temp_celsius",
              "legendFormat": "{{ printer_name }} nozzle {{ nozzle }} actual"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "bambuddy_nozzle_target_celsius",
              "legendFormat": "{{ printer_name }} nozzle {{ nozzle }} target"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Bed & Chamber Temperature",
          "id": 8,
          "gridPos": { "x": 12, "y": 4, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "custom": { "lineWidth": 2, "fillOpacity": 10 }
            }
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "bambuddy_bed_temp_celsius",
              "legendFormat": "{{ printer_name }} bed actual"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "bambuddy_bed_target_celsius",
              "legendFormat": "{{ printer_name }} bed target"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "bambuddy_chamber_temp_celsius",
              "legendFormat": "{{ printer_name }} chamber"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Print Progress",
          "id": 9,
          "gridPos": { "x": 0, "y": 12, "w": 16, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "custom": { "lineWidth": 2, "fillOpacity": 20 }
            }
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "bambuddy_print_progress",
              "legendFormat": "{{ printer_name }}"
            }
          ]
        },
        {
          "type": "gauge",
          "title": "Progress",
          "id": 10,
          "gridPos": { "x": 16, "y": 12, "w": 8, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "blue", "value": null }, { "color": "green", "value": 100 }]
              }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "bambuddy_print_progress",
              "instant": true,
              "legendFormat": "{{ printer_name }}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Fan Speeds",
          "id": 11,
          "gridPos": { "x": 0, "y": 18, "w": 16, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "custom": { "lineWidth": 2, "fillOpacity": 10 }
            }
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "bambuddy_fan_speed_percent",
              "legendFormat": "{{ printer_name }} {{ fan }}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "WiFi Signal",
          "id": 12,
          "gridPos": { "x": 16, "y": 18, "w": 8, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "unit": "dBm",
              "custom": { "lineWidth": 2 },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": -80 },
                  { "color": "green", "value": -70 }
                ]
              }
            }
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "bambuddy_wifi_signal_dbm",
              "legendFormat": "{{ printer_name }}"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Total Prints",
          "id": 13,
          "gridPos": { "x": 0, "y": 24, "w": 8, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] },
              "color": { "mode": "thresholds" }
            }
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "value_and_name",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "bambuddy_prints_total",
              "instant": true,
              "legendFormat": "{{ result }}"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Filament Used",
          "id": 14,
          "gridPos": { "x": 8, "y": 24, "w": 8, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "unit": "g",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] },
              "color": { "mode": "thresholds" }
            }
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "bambuddy_filament_used_grams",
              "instant": true,
              "legendFormat": "{{ printer_name }}"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Total Print Time",
          "id": 15,
          "gridPos": { "x": 16, "y": 24, "w": 8, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] },
              "color": { "mode": "thresholds" }
            }
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "bambuddy_print_time_seconds",
              "instant": true,
              "legendFormat": "{{ printer_name }}"
            }
          ]
        }
      ]
    }
