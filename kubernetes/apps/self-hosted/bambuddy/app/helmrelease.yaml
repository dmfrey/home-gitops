---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bambuddy
spec:
  chartRef:
    kind: OCIRepository
    name: bambuddy
  interval: 1h
  values:
    controllers:
      bambuddy:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          iptables:
            image:
              repository: ghcr.io/nicolaka/netshoot
              tag: latest
            securityContext:
              runAsNonRoot: false
              runAsUser: 0
              capabilities:
                add:
                  - "NET_ADMIN"
            command:
              - /bin/sh
              - -c
              - |
                iptables -t nat -A PREROUTING -p tcp --dport 990 -j REDIRECT --to-port 9990
                iptables -t nat -A OUTPUT -o lo -p tcp --dport 990 -j REDIRECT --to-port 9990
        containers:
          app:
            image:
              repository: ghcr.io/maziggy/bambuddy
              tag: v0.2.2b3@sha256:3c4ca2578bdce9025f53c3870d3ebe52d677ac59a9e9e5f03f3f4c455de812d1
            env:
              TZ: America/New_York
              PORT: "8000"
              LOG_LEVEL: INFO
              LOG_TO_FILE: "false"
              HA_URL: http://home-assistant-app.home.svc.cluster.local:8123
              VIRTUAL_PRINTER_PASV_ADDRESS: "192.168.50.6"
            envFrom:
              - secretRef:
                  name: bambuddy-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8000
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  failureThreshold: 5
              readiness: *probes
            resources:
              requests:
                cpu: 25m
                memory: 256Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      annotations:
        k8s.v1.cni.cncf.io/networks: |
          [{
            "name": "iot-vlan",
            "namespace": "kube-system",
            "ips": ["192.168.50.6/24", "${IPV6_IOT_PREFIX}:4::1/64"],
            "mac": "a6:41:7a:c3:2b:e8"
          }]
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    serviceMonitor:
      app:
        endpoints:
          - port: http
            path: /api/v1/metrics
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] < 400"]
            url: "https://bambuddy.dmfrey.com"
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Tools
          gethomepage.dev/name: BambuBuddy
          gethomepage.dev/icon: bambuddy.png
          gethomepage.dev/description: "Bambu Labs 3D Printer Monitor"
        hostnames:
          - "{{ .Release.Name }}.dmfrey.com"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /app/data
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /app/logs
            subPath: logs
          - path: /tmp
            subPath: tmp
