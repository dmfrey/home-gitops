---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: affine
spec:
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  refreshInterval: 15m
  target:
    name: affine-secret
    template:
      engineVersion: v2
      data:
        AFFINE_ADMIN_EMAIL: "{{ .AFFINE_ADMIN_EMAIL }}"
        AFFINE_ADMIN_PASSWORD: "{{ .AFFINE_ADMIN_PASSWORD }}"
        config.json: |
          {
            "oauth": {
              "providers.oidc": {
                "clientId": "{{ .AUTHENTIK_CLIENT_ID }}",
                "clientSecret": "{{ .AUTHENTIK_CLIENT_SECRET }}",
                "issuer": "https://auth.dmfrey.com/application/o/affine/"
              }
            },
            "copilot": {
              "enabled": true,
              "providers.openai": {
                "apiKey": "ollama",
                "baseURL": "http://ollama.ai.svc.cluster.local:11434/v1",
                "oldApiStyle": true
              },
              "scenarios": {
                "override_enabled": true,
                "scenarios": {
                  "chat": "qwen3:4b",
                  "quick_text_generation": "qwen3:4b",
                  "polish_and_summarize": "qwen3:4b",
                  "coding": "qwen3:4b",
                  "quick_decision_making": "gemma3:4b",
                  "complex_text_generation": "mistral:latest",
                  "embedding": "nomic-embed-text:latest",
                  "rerank": "qllama/bge-reranker-v2-m3:latest",
                  "image": "qwen2.5vl:7b",
                  "audio_transcribing": "qwen3:4b"
                }
              }
            }
          }
  dataFrom:
  - extract:
      key: affine
