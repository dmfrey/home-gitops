---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: affine

spec:

  chartRef:
    kind: OCIRepository
    name: affine

  interval: 1h

  values:

    controllers:

      affine:
        type: statefulset

        annotations:
          reloader.stakater.com/auto: "true"
          secret.reloader.stakater.com/reload: affine-cnpg-app,affine-secret

        initContainers:
          migration:
            image:
              repository: ghcr.io/toeverything/affine
              tag: 0.26.5@sha256:f71846be9d22c93fa8528c122208b9e24cbf013513b67a02f41f5939466c8a99

            command:
              - "sh"
              - "-c"
              - "node ./scripts/self-host-predeploy.js"

            env:
              TZ: America/New_York
              NODE_ENV: production
              AFFINE_INDEXER_ENABLED: true
              AFFINE_INDEXER_SEARCH_PROVIDER: manticoresearch
              AFFINE_INDEXER_SEARCH_ENDPOINT: http://affine-indexer.self-hosted.svc.cluster.local:9308
              AFFINE_SERVER_EXTERNAL_URL: "https://{{ .Release.Name }}.dmfrey.com"
              CONFIG_LOCATION: /root/.affine/config
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: affine-cnpg-app
                    key: uri
              MAILER_HOST: smtp-relay.kube-system.svc.cluster.local
              MAILER_PORT: 25
              MAILER_SENDER: "Affine No Reply <noreply@homelab5767.cc>"
              MAILER_IGNORE_TLS: true
              REDIS_SERVER_HOST: affine-dragonflydb.self-hosted.svc.cluster.local
              REDIS_SERVER_PORT: 6379
              UPLOAD_LOCATION: /root/.affine/storage
              selfHosted: true

        containers:
          app:
            image:
              repository: ghcr.io/toeverything/affine
              tag: 0.26.5@sha256:f71846be9d22c93fa8528c122208b9e24cbf013513b67a02f41f5939466c8a99

            env:
              TZ: America/New_York
              NODE_ENV: production
              AFFINE_INDEXER_ENABLED: true
              AFFINE_INDEXER_SEARCH_PROVIDER: manticoresearch
              AFFINE_INDEXER_SEARCH_ENDPOINT: http://affine-indexer.self-hosted.svc.cluster.local:9308
              AFFINE_SERVER_EXTERNAL_URL: "https://{{ .Release.Name }}.dmfrey.com"
              CONFIG_LOCATION: /root/.affine/config
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: affine-cnpg-app
                    key: uri
              MAILER_HOST: smtp-relay.kube-system.svc.cluster.local
              MAILER_PORT: 25
              MAILER_SENDER: "Affine No Reply <noreply@homelab5767.cc>"
              MAILER_IGNORE_TLS: true
              REDIS_SERVER_HOST: affine-dragonflydb.self-hosted.svc.cluster.local
              REDIS_SERVER_PORT: 6379
              UPLOAD_LOCATION: /root/.affine/storage
              selfHosted: true

            envFrom:
              - secretRef:
                  name: affine-secret

            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3010
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  failureThreshold: 5
              readiness: *probes

            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 2Gi

    service:
      app:
        ports:
          http:
            port: 3010

    route:
      app:
        annotations:
          # gatus.home-operations.com/endpoint: |-
          #   conditions: ["[STATUS] == 200"]
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Tools
          gethomepage.dev/name: Affine
          gethomepage.dev/icon: affine.png
          gethomepage.dev/description: A privacy-focused, local-first, open-source, and ready-to-use alternative for Notion & Miro.
        hostnames:
          - "{{ .Release.Name }}.dmfrey.com"
        parentRefs:
          - name: envoy-external
            namespace: network
          - name: envoy-internal
            namespace: network

    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /root/.affine/config

      app-config:
        type: secret
        name: affine-secret
        advancedMounts:
          affine:
            app:
              - path: /root/.affine/config/config.json
                subPath: config.json
                readOnly: true

      uploads:
        enabled: true
        type: nfs
        server: nas.internal
        path: /media/affine
        globalMounts:
          - path: /root/.affine/storage

      tmp:
        type: emptyDir
