---
# yaml-language-server: $schema=https://raw.githubusercontent.com/envoyproxy/gateway/refs/heads/main/charts/gateway-helm/crds/generated/gateway.envoyproxy.io_securitypolicies.yaml
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: excalidraw
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: excalidraw-app
  extAuth:
    headersToExtAuth:
      - Authorization
      - X-Api-Key
      - cookie
    recomputeRoute: true
    http:
      backendRefs:
        - name: ak-outpost-authentik-embedded-outpost.security.svc.cluster.local
          namespace: security
          port: 9000
      headersToBackend:
        # - cookie
        - Authorization
        # - X-Api-Key
        # - X-authentik-username
        # - X-authentik-email
      path: /outpost.goauthentik.io/auth/envoy
