---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: excalidraw
spec:
  chartRef:
    kind: OCIRepository
    name: excalidraw
  interval: 1h
  values:
    controllers:
      excalidraw:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: excalidraw/excalidraw
              tag: latest
            command:
              - /bin/sh
              - -c
              - |
                find /usr/share/nginx/html/assets -type f -name "*.js" \
                  -exec sed -i 's|https://oss-collab\.excalidraw\.com|https://excalidraw-room.dmfrey.com|g' {} +
                exec nginx -g 'daemon off;'
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 80
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  failureThreshold: 5
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
      excalidraw-room:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: excalidraw/excalidraw-room
              tag: latest
            env:
              REDIS_URI: redis://excalidraw-dragonflydb.self-hosted.svc.cluster.local:6379
            probes:
              liveness: &room-probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 80
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  failureThreshold: 5
              readiness: *room-probes
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
    service:
      app:
        controller: excalidraw
        ports:
          http:
            port: 80
      room:
        controller: excalidraw-room
        ports:
          http:
            port: 80
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 200"]
            url: "http://excalidraw-app.self-hosted.svc.cluster.local"
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Tools
          gethomepage.dev/name: Excalidraw
          gethomepage.dev/icon: excalidraw.png
          gethomepage.dev/description: Virtual collaborative whiteboard.
        hostnames:
          - excalidraw.dmfrey.com
        parentRefs:
          - name: envoy-external
            namespace: network
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /assets/
            filters:
              - type: ResponseHeaderModifier
                responseHeaderModifier:
                  set:
                    - name: Cache-Control
                      value: no-store
            backendRefs:
              - identifier: app
                port: 80
          - backendRefs:
              - identifier: app
                port: 80
      outpost:
        hostnames:
          - excalidraw.dmfrey.com
        parentRefs:
          - name: envoy-external
            namespace: network
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /outpost.goauthentik.io
            backendRefs:
              - name: ak-outpost-authentik-embedded-outpost
                namespace: security
                port: 9000
      room:
        hostnames:
          - excalidraw-room.dmfrey.com
        parentRefs:
          - name: envoy-external
            namespace: network
        rules:
          - backendRefs:
              - identifier: room
                port: 80
