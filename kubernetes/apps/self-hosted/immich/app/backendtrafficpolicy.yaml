---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/gateway.envoyproxy.io/backendtrafficpolicy_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: immich
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: immich
  requestBuffer:
    # Envoy Gateway's hard ceiling is 4294967295 bytes (~4GiB - 1B); 4Gi itself
    # is one byte over that and gets rejected, so stay comfortably under it.
    limit: 4000Mi
