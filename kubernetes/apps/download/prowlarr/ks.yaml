---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prowlarr
spec:
  components:
    - ../../../../components/nfs-scaler
    - ../../../../components/volsync
  dependsOn:
    - name: rook-ceph
      namespace: rook-ceph
  interval: 1h
  path: "./kubernetes/apps/download/prowlarr/app"
  postBuild:
    substitute:
      APP: prowlarr
      CONTROLLER: StatefulSet
      VOLSYNC_CAPACITY: 1Gi
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: prowlarr
      namespace: download
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: download
---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prowlarr-provision
spec:
  dependsOn:
    - name: prowlarr
    - name: tofu-controller
      namespace: flux-system
  interval: 1h
  path: "./kubernetes/apps/download/prowlarr/provision"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: download
  wait: true
