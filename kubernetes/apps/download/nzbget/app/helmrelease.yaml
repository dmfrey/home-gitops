---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nzbget
spec:
  chartRef:
    kind: OCIRepository
    name: nzbget
  interval: 1h
  values:
    controllers:
      nzbget:
        initContainers:
          install-tools:
            image:
              repository: alpine
              tag: "3.23"
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e
                echo "https://dl-cdn.alpinelinux.org/alpine/v3.23/community" >> /etc/apk/repositories
                apk update -q
                apk add --no-cache ffmpeg flac
                mkdir -p /tools/bin /tools/lib
                cp /usr/bin/ffmpeg /usr/bin/metaflac /tools/bin/
                # Copy all shared library dependencies (skip the musl loader itself)
                for bin in /usr/bin/ffmpeg /usr/bin/metaflac; do
                  ldd "$bin" | grep -oE '/[^ ]+\.so[^ ]*' | grep -v '^/lib/ld' \
                    | xargs -I{} cp -n {} /tools/lib/ 2>/dev/null || true
                done
            securityContext:
              runAsUser: 0
              runAsNonRoot: false
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/nzbget
              tag: 26.0.0@sha256:0185f0b026696bfbb89f29aecf777b721a8aa288da90ceb1021b6ee52c6de8f7
            env:
              NZBGET__PORT: &port 80
              TZ: America/New_York
              PATH: /tools/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              LD_LIBRARY_PATH: /tools/lib
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /jsonrpc/status
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 256Mi
    defaultPodOptions:
      annotations:
        k8s.v1.cni.cncf.io/networks: |-
          [{
            "name": "vpn-vlan",
            "namespace": "kube-system",
            "ips": ["192.168.90.21/24"],
            "mac": "a6:3e:4f:09:e4:9c"
          }]
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.dmfrey.com"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
      media:
        type: nfs
        server: nas.internal
        path: /media
        globalMounts:
          - path: /media/downloads/nzbget
            subPath: downloads/nzbget
      tools:
        type: emptyDir
        advancedMounts:
          nzbget:
            install-tools:
              - path: /tools
            app:
              - path: /tools
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
