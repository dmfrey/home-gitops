---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-cluster

spec:

  chartRef:
    kind: OCIRepository
    name: rook-ceph-cluster

  interval: 1h

  values:

    monitoring:
      enabled: true
      createPrometheusRules: true

    toolbox:
      enabled: true

    route:
      dashboard:
        host:
          name: rook.dmfrey.com
          path: /
          pathType: PathPrefix
        parentRefs:
          - name: envoy-internal
            namespace: network

    cephClusterSpec:

      cephConfig:
        global:
          bdev_async_discard_threads: "1" # quote
          bdev_enable_discard: "true" # quote
          bluestore_cache_size_ssd: "4294967296" # 4Gi

          device_failure_prediction_mode: local # requires mgr module
          mon_warn_on_slow_ping_ratio: "0.75"    # warn only when OSD ping >75% of grace (15s); default 0.5 (10s) too sensitive on shared NVMe+etcd nodes
          osd_class_update_on_start: "false" # quote
          osd_memory_target: "4294967296" # 4Gi

        mgr:
          mgr/crash/warn_recent_interval: "7200" # 2 hours (default is 1209600 = 2 weeks)

        osd:
          bluestore_slow_ops_warn_lifetime: "7200" # 2 hours (default is 86400 = 24 hours)
          osd_scrub_begin_hour: "1"                # restrict scrubs to 01:00-07:00 UTC — prevents deep scrub I/O from spiking etcd WAL fsync during day
          osd_scrub_end_hour: "7"

      cleanupPolicy:
        wipeDevicesFromOtherClusters: true

      crashCollector:
        disable: false

      csi:
        readAffinity:
          enabled: true

      dashboard:
        enabled: true
        urlPrefix: /
        ssl: false
        prometheusEndpoint: http://prometheus-operated.observability.svc.cluster.local:9090

      mgr:
        modules:
          - name: diskprediction_local
            enabled: true
          - name: insights
            enabled: true
          - name: pg_autoscaler
            enabled: true
          - name: rook
            enabled: true

      network:
        provider: host
        connections:
          requireMsgr2: true

      resources:
        mgr:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            memory: 2Gi
        osd:
          requests:
            cpu: 1000m
          limits:
            memory: 8Gi
            cpu: 2000m

      storage:
        useAllNodes: false
        # useAllDevices: false
        nodes:
          - name: "k8s-0"
            devicePathFilter: /dev/disk/by-id/nvme-SPCC_M.2_PCIe_SSD_*
          - name: "k8s-1"
            devicePathFilter: /dev/disk/by-id/nvme-SPCC_M.2_PCIe_SSD_*
          - name: "k8s-2"
            devicePathFilter: /dev/disk/by-id/nvme-SPCC_M.2_PCIe_SSD_*
        config:
          osdsPerDevice: "1"
          bluestore_block_db_size: "214748364800" # 200Gi
          # devicePathFilter: /dev/disk/by-id/nvme-SPCC_M.2_PCIe_SSD_*

    cephBlockPools:
      - name: ceph-blockpool
        spec:
          failureDomain: host
          replicated:
            size: 3
        storageClass:
          enabled: true
          name: ceph-block
          isDefault: true
          reclaimPolicy: Delete
          allowVolumeExpansion: true
          volumeBindingMode: Immediate
          mountOptions:
            - discard
          parameters:
            # compression_mode: aggressive
            # compression_algorithm: zstd
            imageFormat: "2"
            imageFeatures: layering,fast-diff,object-map,deep-flatten,exclusive-lock
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
            csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/fstype: ext4

    cephBlockPoolsVolumeSnapshotClass:
      enabled: true
      name: csi-ceph-blockpool
      isDefault: false
      deletionPolicy: Delete

    cephFileSystems:
      - name: &cephFileSystemName ceph-filesystem
        spec:
          metadataPool:
            replicated:
              size: 3
          dataPools:
            - failureDomain: host
              replicated:
                size: 3
              name: data0
          metadataServer:
            activeCount: 1
            activeStandby: true
            priorityClassName: system-cluster-critical
            placement:
              topologySpreadConstraints:
                - maxSkew: 1
                  topologyKey: kubernetes.io/hostname
                  whenUnsatisfiable: DoNotSchedule
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: ceph-mds
                      app.kubernetes.io/part-of: *cephFileSystemName
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                memory: 4Gi
        storageClass:
          enabled: true
          isDefault: false
          name: ceph-filesystem
          pool: data0
          reclaimPolicy: Delete
          allowVolumeExpansion: true
          volumeBindingMode: Immediate
          parameters:
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-cephfs-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-cephfs-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-cephfs-node
            csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/fstype: ext4

    cephFileSystemVolumeSnapshotClass:
      enabled: true
      name: csi-ceph-filesystem
      isDefault: false
      deletionPolicy: Delete

    cephObjectStores: []
