---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ceph-csi-drivers

spec:

  chart:
    spec:
      chart: ceph-csi-drivers
      version: 1.0.1
      sourceRef:
        kind: HelmRepository
        name: ceph-csi-operator

  interval: 1h

  values:

    operatorConfig:
      driverSpecDefaults:
        cephFsClientType: kernel
        clusterName: rook-ceph
        deployCsiAddons: false
        fsGroupPolicy: File
        generateOMapInfo: false
        controllerPlugin:
          hostNetwork: true
          replicas: 2
          priorityClassName: system-cluster-critical
          deploymentStrategy:
            type: Recreate
        nodePlugin:
          kubeletDirPath: /var/lib/kubelet
          priorityClassName: system-node-critical

    drivers:
      cephfs:
        enabled: true
        snapshotPolicy: volumeGroupSnapshot
        kernelMountOptions:
          ms_mode: prefer-crc
        controllerPlugin:
          resources:
            attacher:
              requests: {cpu: 100m, memory: 128Mi}
              limits: {memory: 256Mi}
            plugin:
              requests: {cpu: 250m, memory: 512Mi}
              limits: {memory: 1Gi}
            provisioner:
              requests: {cpu: 100m, memory: 128Mi}
              limits: {memory: 256Mi}
            resizer:
              requests: {cpu: 100m, memory: 128Mi}
              limits: {memory: 256Mi}
            snapshotter:
              requests: {cpu: 100m, memory: 128Mi}
              limits: {memory: 256Mi}
        nodePlugin:
          resources:
            plugin:
              requests: {cpu: 250m, memory: 512Mi}
              limits: {memory: 1Gi}
            registrar:
              requests: {cpu: 50m, memory: 128Mi}
              limits: {memory: 256Mi}

      rbd:
        enabled: true
        controllerPlugin:
          resources:
            attacher:
              requests: {cpu: 100m, memory: 128Mi}
              limits: {memory: 256Mi}
            omapGenerator:
              requests: {cpu: 250m, memory: 512Mi}
              limits: {memory: 1Gi}
            plugin:
              requests: {memory: 512Mi}
              limits: {memory: 1Gi}
            provisioner:
              requests: {cpu: 100m, memory: 128Mi}
              limits: {memory: 256Mi}
            resizer:
              requests: {cpu: 100m, memory: 128Mi}
              limits: {memory: 256Mi}
            snapshotter:
              requests: {cpu: 100m, memory: 128Mi}
              limits: {memory: 256Mi}
        nodePlugin:
          resources:
            plugin:
              requests: {cpu: 250m, memory: 512Mi}
              limits: {memory: 1Gi}
            registrar:
              requests: {cpu: 50m, memory: 128Mi}
              limits: {memory: 256Mi}

      nfs:
        enabled: false

      nvmeof:
        enabled: false
