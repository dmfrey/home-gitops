---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: loki-s3
spec:
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  refreshInterval: 15m
  target:
    name: loki-s3-secret
    template:
      data:
        S3_ACCESS_KEY: "{{ .GARAGE_LOKI_ACCESS_KEY }}"
        S3_SECRET_KEY: "{{ .GARAGE_LOKI_SECRET_KEY }}"
  dataFrom:
    - extract:
        key: garage
