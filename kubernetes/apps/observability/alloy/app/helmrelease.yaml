---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
spec:
  chartRef:
    kind: OCIRepository
    name: alloy
  interval: 1h
  values:
    alloy:
      extraPorts:
        - name: otlp-grpc
          port: 4317
          targetPort: 4317
          protocol: TCP
        - name: otlp-http
          port: 4318
          targetPort: 4318
          protocol: TCP
      configMap:
        create: true
        content: |-
          // Discover Kubernetes pods
          discovery.kubernetes "pods" {
            role = "pod"
          }

          // Relabel discovered pods to extract metadata
          discovery.relabel "pods" {
            targets = discovery.kubernetes.pods.targets

            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              target_label  = "namespace"
            }

            rule {
              source_labels = ["__meta_kubernetes_pod_name"]
              target_label  = "pod"
            }

            rule {
              source_labels = ["__meta_kubernetes_pod_container_name"]
              target_label  = "container"
            }

            rule {
              source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
              target_label  = "app"
            }

            rule {
              source_labels = ["__meta_kubernetes_pod_node_name"]
              target_label  = "node"
            }
          }

          // Collect logs from Kubernetes pods
          loki.source.kubernetes "pods" {
            targets    = discovery.relabel.pods.output
            forward_to = [loki.process.pods.receiver]
          }

          // Process logs
          loki.process "pods" {
            // Drop empty log lines
            stage.drop {
              expression = "^\\s*$"
            }

            forward_to = [loki.write.default.receiver]
          }

          // Write logs to Loki
          loki.write "default" {
            endpoint {
              url = "http://loki-gateway.observability.svc.cluster.local:80/loki/api/v1/push"
            }
          }

          // Receive OTLP traces and metrics from applications
          otelcol.receiver.otlp "default" {
            grpc {
              endpoint = "0.0.0.0:4317"
            }
            http {
              endpoint = "0.0.0.0:4318"
            }
            output {
              traces  = [otelcol.processor.batch.default.input]
              metrics = [otelcol.exporter.prometheus.otlp.input]
            }
          }

          // Batch traces before exporting
          otelcol.processor.batch "default" {
            output {
              traces = [otelcol.exporter.otlp.tempo.input]
            }
          }

          // Export traces to Tempo
          otelcol.exporter.otlp "tempo" {
            client {
              endpoint = "tempo.observability.svc.cluster.local:4317"
              tls {
                insecure = true
              }
            }
          }

          // Convert OTLP metrics to Prometheus format
          otelcol.exporter.prometheus "otlp" {
            forward_to = [prometheus.remote_write.default.receiver]
          }

          // Forward metrics to Prometheus via remote write
          prometheus.remote_write "default" {
            endpoint {
              url = "http://prometheus-operated.observability.svc.cluster.local:9090/api/v1/write"
            }
          }

    controller:
      type: daemonset

    serviceMonitor:
      enabled: true
