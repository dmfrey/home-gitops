---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/grafana.integreatly.org/grafana_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  labels:
    grafana.internal/instance: grafana
spec:

  config:

    analytics:
      check_for_updates: "false"
      check_for_plugin_updates: "false"
      feedback_links_enabled: "false"
      reporting_enabled: "false"

    auth:
      disable_login_form: "false"
      oauth_auto_login: "false"
      oauth_allow_insecure_email_lookup: "true"

    auth.anonymous:
      enabled: "true"

    log:
      mode: console

    metrics:
      enabled: "true"

    news:
      news_feed_enabled: "false"

    plugins:
      plugin_admin_enabled: "false"

    server:
      enable_gzip: "true"
      root_url: https://grafana.dmfrey.com

    unified_alerting:
      ha_listen_address: "0.0.0.0:9094"
      ha_peers: "grafana-alerting.observability.svc.cluster.local:9094"

  deployment:
    spec:
      strategy:
        type: Recreate

      template:
        spec:
          containers:
            - name: grafana
              env:
                - name: GF_SECURITY_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: grafana-admin-password-secret
                      key: GF_SECURITY_ADMIN_PASSWORD

              envFrom:
                - secretRef:
                    name: grafana-oauth-secret

              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: {drop: ["ALL"]}

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch

          volumes:
            - name: grafana-data
              persistentVolumeClaim:
                claimName: grafana-pvc

  httpRoute:
    spec:
      hostnames:
        - grafana.dmfrey.com
      parentRefs:
        - name: envoy-external
          namespace: network
      rules:
        - backendRefs:
            - name: grafana-service
              port: 3000

  persistentVolumeClaim:
    spec:
      accessModes:
        - ReadWriteOnce

      resources:
        requests:
          storage: 10Gi

      storageClassName: ceph-block

  disableDefaultSecurityContext: All
