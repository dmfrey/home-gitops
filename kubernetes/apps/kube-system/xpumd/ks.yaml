---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: xpumd
spec:
  suspend: true  # xpumd chart 2.0.0-rc.0 has invalid label bug; re-enable when stable release ships
  interval: 1h
  path: ./kubernetes/apps/kube-system/xpumd/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: kube-system
  dependsOn:
    - name: intel-gpu-resource-driver
