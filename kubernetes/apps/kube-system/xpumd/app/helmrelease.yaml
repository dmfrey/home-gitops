---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: xpumd
spec:
  suspend: true  # xpumd chart 2.0.0-rc.0 has invalid label bug; re-enable when stable release ships
  chartRef:
    kind: OCIRepository
    name: xpumd
  interval: 1h
  values:
    gpuAccess: dra
    nodeSelector:
      node.kubernetes.io/gpu: "true"
    prometheus:
      monitor: true
      release: kube-prometheus-stack
    grafana:
      dashboards: true
      namespace: observability
