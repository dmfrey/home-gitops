---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: xpumd
spec:
  chartRef:
    kind: OCIRepository
    name: xpumd
  interval: 1h
  values:
    image:
      tag: v2.0.0-rc.0
    gpuAccess: dra
    nodeSelector:
      node.kubernetes.io/gpu: "true"
    prometheus:
      monitor: true
      release: kube-prometheus-stack
    grafana:
      dashboards: true
      namespace: kube-system
  postRenderers:
    - kustomize:
        patches:
          - patch: |-
              - op: replace
                path: /metadata/labels/app.kubernetes.io~1version
                value: 2.0.0-rc.0
            target:
              labelSelector: "app.kubernetes.io/instance=xpumd"
          - patch: |-
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: xpumd-config
              data:
                config.yaml: |-
                  exporters:
                    intelxpuinfo:
                      endpoint: /run/xpumd/intelxpuinfo.sock
                    prometheus:
                      endpoint: 0.0.0.0:8080
                  extensions: {}
                  processors:
                    intelxpustatus: {}
                  receivers:
                    intelxpu:
                      collection_interval: 5s
                      initial_delay: 1s
                      log_level: info
                      metrics: {}
                      sampling_interval: 1s
                      timeout: 0
                  service:
                    pipelines:
                      metrics:
                        exporters:
                        - intelxpuinfo
                        - prometheus
                        processors:
                        - intelxpustatus
                        receivers:
                        - intelxpu
                    telemetry:
                      logs:
                        level: info
            target:
              kind: ConfigMap
              name: xpumd-config
