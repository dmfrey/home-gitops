---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: multus
spec:

  chartRef:
    kind: OCIRepository
    name: multus

  interval: 1h

  values:

    cni:
      binPath: /opt/cni/bin
      netPath: /etc/cni/net.d

    multus:
      pod:
        automountServiceAccountToken: true  # multus needs API server access for NAD CRDs; common v5 defaults this to false
      resources:
        requests:
          cpu: 10m
        limits:
          memory: 512Mi
