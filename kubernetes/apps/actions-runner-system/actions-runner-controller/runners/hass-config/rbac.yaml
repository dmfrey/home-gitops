---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hass-config-runner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hass-config-runner
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hass-config-runner
  namespace: home
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: hass-config-runner
subjects:
  - kind: ServiceAccount
    name: hass-config-runner
    namespace: actions-runner-system
