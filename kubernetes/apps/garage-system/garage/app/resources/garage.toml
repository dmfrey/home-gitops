metadata_dir = "/mnt/metadata"
data_dir = "/mnt/data"
db_engine = "lmdb"

replication_mode = "1"

rpc_bind_addr = "[::]:3901"
rpc_secret_file = "/etc/garage/secrets/RPC_SECRET"

[s3_api]
s3_region = "us-east-1"
api_bind_addr = "[::]:3900"

[admin]
api_bind_addr = "[::]:3903"
admin_token_file = "/etc/garage/secrets/ADMIN_TOKEN"
