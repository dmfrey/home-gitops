---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: &app garage
  namespace: garage-system # keep
  labels:
    app.kubernetes.io/instance: *app
    app.kubernetes.io/name: *app
rules:
  - apiGroups:
      - deuxfleurs.fr
    resources:
      - garagenodes
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: &app garage
  namespace: garage-system # keep
  labels:
    app.kubernetes.io/instance: *app
    app.kubernetes.io/name: *app
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: *app
subjects:
  - kind: ServiceAccount
    name: *app
    namespace: garage-system # keep
