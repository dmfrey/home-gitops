---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./externalsecret.yaml
  - ./grafanadashboard.yaml
  - ./helmrelease.yaml
  - ./ocirepository.yaml

configMapGenerator:
  - name: garage-config
    files:
      - garage.toml=./resources/garage.toml

generatorOptions:
  disableNameSuffixHash: true
