---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: garage
spec:
  chartRef:
    kind: OCIRepository
    name: garage
  interval: 1h
  values:
    controllers:
      garage:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: dxflrs/garage
              tag: v2.2.0
            args:
              - --config
              - /etc/garage/garage.toml
              - server
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &admin-port 3903
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *admin-port
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: garage
        ports:
          s3:
            port: 3900
          rpc:
            port: 3901
          web:
            port: 3902
          admin:
            port: 3903
    serviceMonitor:
      app:
        endpoints:
          - port: admin
            path: /metrics
            interval: 30s
    persistence:
      config:
        type: configMap
        name: garage-config
        globalMounts:
          - path: /etc/garage/garage.toml
            subPath: garage.toml
            readOnly: true
      secrets:
        type: secret
        name: garage-secret
        globalMounts:
          - path: /etc/garage/secrets
            readOnly: true
      metadata:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /mnt/metadata
      data:
        type: nfs
        server: nas.internal
        path: /garage
        globalMounts:
          - path: /mnt/data
      tmp:
        type: emptyDir
