---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: garage
spec:
  chartRef:
    kind: OCIRepository
    name: garage
  interval: 1h
  values:
    global:
      createDefaultServiceAccount: false
    controllers:
      garage:
        type: statefulset
        replicas: 3
        annotations:
          reloader.stakater.com/auto: "true"
        statefulset:
          # Governing headless Service for stable per-pod DNS (garage-0.garage-headless...),
          # used for RPC peer discovery instead of a hardcoded rpc_public_addr.
          serviceName:
            identifier: headless
          volumeClaimTemplates:
            - name: meta
              size: 20Gi
              accessMode: ReadWriteOnce
              storageClass: ceph-block
              globalMounts:
                - path: /meta
        serviceAccount:
          identifier: garage
        containers:
          app:
            image:
              repository: dxflrs/garage
              tag: v2.3.0@sha256:866bd13ed2038ba7e7190e840482bc27234c4afaf77be8cfa439ae088c1e4690
            env:
              RUST_LOG: "garage=debug"
              TZ: America/New_York
              # Used to give each replica's shared-NFS data dir its own subPath (see persistence.data below).
              POD_NAME:
                fieldRef:
                  fieldPath: metadata.name
            envFrom:
              - secretRef:
                  name: garage-secret
            # probes:
            #   liveness: &probes
            #     enabled: true
            #     custom: true
            #     spec:
            #       httpGet:
            #         path: /health
            #         port: 3903
            #       initialDelaySeconds: 15
            #       periodSeconds: 30
            #       timeoutSeconds: 5
            #       failureThreshold: 3
            #   readiness: *probes
            #   startup:
            #     enabled: true
            #     spec:
            #       httpGet:
            #         path: /health
            #         port: 3903
            #       failureThreshold: 30
            #       periodSeconds: 10
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
    defaultPodOptions:
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        # Keep the existing Service name so the HTTPRoute backendRef below doesn't break
        # now that a second (headless) Service is being added.
        forceRename: garage
        ports:
          s3:
            port: &port 3900
          admin:
            port: 3903
      headless:
        clusterIP: None
        ports:
          rpc:
            port: 3901
            protocol: TCP
    serviceMonitor:
      app:
        service:
          identifier: app
        endpoints:
          - port: admin
            path: /metrics
            interval: 30s
            bearerTokenSecret:
              name: garage-secret
              key: GARAGE_METRICS_TOKEN
    route:
      app:
        hostnames:
          - s3.dmfrey.com
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: garage
                port: *port
    configMaps:
      config:
        data:
          configuration.toml: |
            metadata_dir = "/meta"
            data_dir = "/data"
            db_engine = "lmdb"
            metadata_auto_snapshot_interval = "6h"
            metadata_snapshots_dir = "/data/garage-meta-snapshots"

            replication_factor = 3
            consistency_mode = "consistent"
            compression_level = 2

            rpc_bind_addr = "[::]:3901"
            # No static rpc_public_addr: it can't be pod-specific in a single shared
            # ConfigMap mounted by all 3 replicas. Instead, filter autodiscovery (via
            # kubernetes_discovery below) to the cluster's pod CIDR.
            rpc_public_addr_subnet = "10.42.0.0/16"

            [kubernetes_discovery]
            namespace = "garage-system"
            service_name = "garage"
            # CRD is Flux-managed (see crd.yaml) so garage's ServiceAccount doesn't need
            # cluster-wide customresourcedefinitions RBAC, only verbs on garagenodes itself.
            skip_crd = true

            [s3_api]
            s3_region = "us-east-1"
            api_bind_addr = "[::]:3900"
            root_domain = ".s3.dmfrey.com"

            [admin]
            api_bind_addr = "[::]:3903"
    persistence:
      config:
        enabled: true
        type: configMap
        name: garage
        globalMounts:
          - path: /etc/garage.toml
            subPath: configuration.toml
            readOnly: true
      data:
        type: nfs
        server: nas.internal
        path: /garage
        globalMounts:
          # Same NFS export shared by all 3 replicas, but each pod gets its own
          # subdirectory so they don't write into each other's data blocks.
          - path: /data
            subPathExpr: "$(POD_NAME)"
      tmp:
        type: emptyDir
    serviceAccount:
      garage: {}
