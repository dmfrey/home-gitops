---
# yaml-language-server: $schema=https://kubernetes-schemas.dmfrey.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: garage
spec:
  chartRef:
    kind: OCIRepository
    name: garage
  interval: 1h
  values:
    controllers:
      garage:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: dxflrs/garage
              tag: v2.2.0
            env:
              RUST_LOG: "garage=debug"
              TZ: America/New_York
            envFrom:
              - secretRef:
                  name: garage-secret
            # probes:
            #   liveness: &probes
            #     enabled: true
            #     custom: true
            #     spec:
            #       httpGet:
            #         path: /health
            #         port: 3903
            #       initialDelaySeconds: 15
            #       periodSeconds: 30
            #       timeoutSeconds: 5
            #       failureThreshold: 3
            #   readiness: *probes
            #   startup:
            #     enabled: false
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        controller: garage
        ports:
          s3:
            port: &port 3900
          s3-http:
            port: 80
            targetPort: 3900
          admin:
            port: 3903
    serviceMonitor:
      app:
        endpoints:
          - port: admin
            path: /metrics
            interval: 30s
    route:
      app:
        hostnames:
          - s3.dmfrey.com
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: garage
                port: *port
    configMaps:
      config:
        data:
          configuration.toml: |
            metadata_dir = "/meta"
            data_dir = "/data"
            db_engine = "lmdb"
            metadata_auto_snapshot_interval = "6h"

            replication_factor = 1
            compression_level = 2

            rpc_bind_addr = "[::]:3901"
            rpc_public_addr = "127.0.0.1:3901"

            [s3_api]
            s3_region = "us-east-1"
            api_bind_addr = "[::]:3900"
            root_domain = ".s3.dmfrey.com"

            [admin]
            api_bind_addr = "[::]:3903"
    persistence:
      config:
        enabled: true
        type: configMap
        name: garage
        globalMounts:
          - path: /etc/garage.toml
            subPath: configuration.toml
            readOnly: true
      data:
        type: nfs
        server: nas.internal
        path: /garage
        globalMounts:
          - path: /data
      meta:
        existingClaim: "{{ .Release.Name }}"
      tmp:
        type: emptyDir
